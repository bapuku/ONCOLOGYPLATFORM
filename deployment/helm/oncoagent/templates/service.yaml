apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-orchestration
  labels:
    app: {{ .Chart.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Chart.Name }}
    component: orchestration
