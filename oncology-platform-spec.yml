        - "Mindfulness exercises"
        - "Resource directory (counselors, support programs)"
        - "Peer support matching"

# ============================================================================
# SECTION 6: COMPLIANCE, SECURITY & GOVERNANCE
# ============================================================================

compliance:
  eu_ai_act:
    classification: "HIGH_RISK (Annex III, Point 5(b): AI intended to be used as safety components in the management and operation of medical devices)"
    requirements:
      risk_management_system:
        reference: "Article 9"
        implementation:
          - "Comprehensive risk register maintained for all AI functions"
          - "Risk-benefit analysis for each agent's clinical use"
          - "Continuous risk monitoring with automated incident detection"
          - "Residual risk mitigation: human oversight, confidence thresholds, fallback procedures"
          - "ISO 14971 risk management process integration"
        documentation: "Risk Management File per ISO 14971, updated quarterly"

      data_data_governance:
        reference: "Article 10"
        implementation:
          - "Training data documentation: sources, selection criteria, preprocessing steps"
          - "Bias detection and mitigation pipeline for all datasets"
          - "Data quality metrics tracked and reported"
          - "Validation and testing datasets separate from training"
          - "Representative patient population in training data"
          - "Continuous monitoring for data drift"
        datasets_registry:
          - name: "TCGA Pan-Cancer Atlas"
            purpose: "Genomic model training"
            bias_assessment: "Complete"
          - name: "MIMIC-IV"
            purpose: "Clinical NLP model training"
            bias_assessment: "Complete"
          - name: "Proprietary Hospital Data (anonymized)"
            purpose: "Local model fine-tuning"
            bias_assessment: "Ongoing"

      transparency:
        reference: "Article 13"
        implementation:
          - "All AI outputs include reasoning traces accessible on demand"
          - "Confidence scores displayed for all recommendations"
          - "Model version and training data summary available"
          - "Instructions for use documentation (IFU) maintained"
          - "User-facing explanation system ('Why did the AI recommend this?')"
        explanation_system:
          technical: "Detailed reasoning path with knowledge graph traversal log"
          clinical: "Simplified evidence summary with guideline citations"
          patient: "Plain language explanation suitable for laypersons"

      human_oversight:
        reference: "Article 14"
        implementation:
          - "All treatment recommendations require oncologist approval"
          - "All diagnoses require specialist confirmation"
          - "Override capability at every decision point"
          - "Human review queue for edge cases (low confidence, novel situations)"
          - "Audit trail of all human oversight decisions"
          - "Emergency stop: ability to disable any AI function immediately"
        oversight_levels:
          routine: "AI recommendation with human confirmation before action"
          high_risk: "Mandatory human review before AI output is shown"
          critical: "AI provides analysis only; human makes all decisions"

      accuracy_robustness_cybersecurity:
        reference: "Article 15"
        implementation:
          accuracy:
            - "Minimum performance thresholds per task (e.g., sensitivity > 0.90 for tumor detection)"
            - "Regular performance audits against held-out validation sets"
            - "Continuous monitoring for performance degradation"
            - "Automatic alerts if accuracy falls below threshold"
          robustness:
            - "Adversarial testing conducted quarterly"
            - "Input validation to detect anomalous/malformed data"
            - "Graceful degradation: if AI uncertain, defer to human"
            - "Redundancy: multiple models for critical functions"
          cybersecurity:
            - "ISO 27001 certified infrastructure"
            - "Penetration testing annually"
            - "Encryption at rest (AES-256) and in transit (TLS 1.3)"
            - "Zero-trust network architecture"
            - "Model integrity verification (hash validation)"

      record_keeping:
        reference: "Article 12"
        implementation:
          - "Automatic logging of all AI inputs, outputs, and decisions"
          - "Logs retained for 10 years (medical device requirement)"
          - "Immutable audit trail (blockchain-based or equivalent)"
          - "Log accessibility for competent authorities"
        log_content:
          - "Timestamp"
          - "User ID (pseudonymized for patients)"
          - "Query/Input"
          - "AI Output"
          - "Confidence scores"
          - "Model version"
          - "Reasoning trace"
          - "Human oversight action (if any)"
          - "Data sources accessed"

      conformity_assessment:
        reference: "Article 43"
        status: "IN_PROGRESS"
        notified_body: "TBD (BSI, TÜV, or equivalent)"
        process:
          - "Technical documentation compilation"
          - "Quality management system audit (ISO 13485)"
          - "Clinical evaluation per MDR"
          - "Notified body assessment"
          - "CE marking application"
        timeline:
          technical_documentation: "Q3 2025"
          notified_body_submission: "Q4 2025"
          ce_marking_target: "Q2 2026"

      post_market_monitoring:
        reference: "Article 61"
        implementation:
          - "Incident reporting system (within 24h for serious incidents)"
          - "Performance monitoring dashboard"
          - "User feedback collection and analysis"
          - "Periodic safety update reports (PSUR)"
          - "Corrective action process"

  gdpr:
    reference: "Regulation (EU) 2016/679"
    data_controller: "[Institution Name]"
    dpo_contact: "dpo@institution.eu"
    implementation:
      lawful_basis:
        patient_data: "Article 6(1)(c) legal obligation + Article 9(2)(h) medical treatment"
        research_data: "Article 6(1)(a) consent + Article 9(2)(j) scientific research"
      data_minimization:
        - "Only data necessary for specific purpose is processed"
        - "Purpose limitation enforced by access controls"
        - "Storage limitation: automatic archival/deletion policies"
      patient_rights:
        right_to_access: "Patient portal provides data export (FHIR format)"
        right_to_rectification: "Correction request workflow implemented"
        right_to_erasure: "Erasure request workflow with legal hold exceptions"
        right_to_restriction: "Processing restriction flag in patient record"
        right_to_portability: "FHIR export in JSON format"
        right_to_object: "Opt-out mechanism for AI processing"
        right_to_explanation: "AI decision explanation available on request"
      consent_management:
        implementation: "FHIR Consent resource"
        granularity:
          - "AI-assisted care support"
          - "Research data contribution (anonymized)"
          - "Communication preferences (WhatsApp, SMS, email)"
          - "Data sharing with external researchers"
        withdrawal: "Consent withdrawal honored within 72h"
      privacy_by_design:
        pseudonymization:
          - "All patient identifiers replaced with pseudonyms in analytics"
          - "Separate secure vault for identity mapping (restricted access)"
        anonymization:
          - "K-anonymity (k >= 5) for research datasets"
          - "Differential privacy for aggregate statistics"
        encryption:
          at_rest: "AES-256"
          in_transit: "TLS 1.3"
          key_management: "HSM-based key management"
      data_protection_impact_assessment:
        status: "COMPLETE"
        date: "2025-01-15"
        review_schedule: "Annual or upon significant system change"
      cross_border_transfers:
        policy: "Data remains within EU/EEA"
        cloud_providers: "EU-based data centers only"
        exceptions: "Standard Contractual Clauses if transfer necessary"

  medical_device_regulation:
    reference: "Regulation (EU) 2017/745 (MDR)"
    classification: "Class IIa (Rule 11 - software intended to provide information for diagnostic or therapeutic decisions)"
    requirements:
      quality_management_system:
        standard: "ISO 13485:2016"
        certification_status: "IN_PROGRESS"
        scope: "Design, development, and maintenance of oncology AI platform"
      clinical_evaluation:
        standard: "MEDDEV 2.7/1 Rev 4"
        status: "IN_PROGRESS"
        evidence_sources:
          - "Clinical literature review"
          - "Equivalence assessment"
          - "Clinical investigation data (if applicable)"
      technical_documentation:
        contents:
          - "Device description and specification"
          - "Design and manufacturing information"
          - "Risk management documentation"
          - "Clinical evaluation report"
          - "Post-market surveillance plan"
          - "Instructions for use (IFU)"
      unique_device_identification:
        udi_format: "GS1"
        eudamed_registration: "PENDING"

  iso_standards:
    iso_13485:
      title: "Medical devices - Quality management systems"
      status: "CERTIFICATION_IN_PROGRESS"
      scope: "Full platform development and operations"
    iso_14971:
      title: "Medical devices - Risk management"
      status: "IMPLEMENTED"
      integration: "Risk management file maintained per standard"
    iso_27001:
      title: "Information security management systems"
      status: "CERTIFIED"
      certification_date: "2024-06-15"
      scope: "Platform infrastructure and operations"
    iso_42001:
      title: "Artificial Intelligence - Management System"
      status: "IMPLEMENTATION_IN_PROGRESS"
      target_certification: "Q4 2025"
      scope: "AI lifecycle management, responsible AI practices"
    iec_62304:
      title: "Medical device software - Software life cycle processes"
      status: "IMPLEMENTED"
      safety_class: "Class B (non-serious injury possible)"
      processes:
        - "Software development planning"
        - "Software requirements analysis"
        - "Software architectural design"
        - "Software detailed design"
        - "Software unit implementation and verification"
        - "Software integration and testing"
        - "Software system testing"
        - "Software release"
        - "Software maintenance"
    iec_82304_1:
      title: "Health software - General requirements for product safety"
      status: "IMPLEMENTED"
      scope: "Platform as health software product"
    iso_iec_23894:
      title: "AI Risk Management"
      status: "IMPLEMENTED"
      integration: "Integrated with ISO 14971 risk management process"

  security:
    infrastructure:
      cloud_provider: "EU-sovereign cloud (OVHcloud / Scaleway / or on-premise)"
      data_residency: "EU only"
      architecture:
        - "Zero-trust network model"
        - "Microservices in isolated containers (Kubernetes)"
        - "Network segmentation (clinical, research, admin)"
        - "WAF and DDoS protection"
    access_control:
      authentication:
        - "Single Sign-On (SSO) via SAML 2.0 / OIDC"
        - "Multi-Factor Authentication (MFA) mandatory"
        - "Biometric option for mobile"
      authorization:
        model: "Role-Based Access Control (RBAC) + Attribute-Based Access Control (ABAC)"
        roles:
          - "oncologist: full patient access, AI interaction, feedback"
          - "radiologist: imaging access, ImagingAgent interaction"
          - "nurse: patient communication, alerts, symptom tracking"
          - "researcher: anonymized data access, aggregate analytics"
          - "patient: own data only, chatbot, symptom tracking"
          - "admin: system configuration, user management"
        audit: "All access logged and auditable"
    data_security:
      encryption:
        at_rest: "AES-256-GCM"
        in_transit: "TLS 1.3 (mTLS for inter-service)"
        key_management: "HashiCorp Vault with HSM backing"
      backup:
        frequency: "Continuous replication + daily snapshots"
        retention: "7 years minimum"
        testing: "Quarterly restore tests"
        encryption: "Backups encrypted with separate keys"
      secure_development:
        - "SAST (Static Application Security Testing) in CI/CD"
        - "DAST (Dynamic Application Security Testing) weekly"
        - "Dependency vulnerability scanning daily"
        - "Container image scanning"
        - "Code review mandatory for all changes"
    incident_response:
      plan: "ISO 27035 aligned incident response plan"
      team: "Dedicated security incident response team"
      notification:
        data_breach: "Within 72h to supervisory authority (GDPR Art. 33)"
        serious_incident: "Within 24h to competent authority (MDR Art. 87)"
      drills: "Quarterly incident response exercises"

# ============================================================================
# SECTION 7: GLOBAL OUTPUT FORMATTING
# ============================================================================

global_formatting:
  alert_schema:
    type: "object"
    required_fields:
      - "situation_summary"
      - "supporting_evidence"
      - "json_metrics"
      - "vocal_summary"
    description: "Standard schema that all agents follow when generating alerts or reports."
    json_schema:
      type: "object"
      properties:
        situation_summary:
          type: "string"
          description: "Concise textual summary of the situation or finding (2-4 sentences)."
        supporting_evidence:
          type: "array"
          items:
            type: "string"
          description: "Bullet-point evidence or reasoning backing up the summary."
        json_metrics:
          type: "object"
          description: "Key quantitative metrics, codes, or flags using standard schemas."
        vocal_summary:
          type: "string"
          description: "Short, natural-language summary for verbal communication (1-2 sentences, patient-friendly)."
        metadata:
          type: "object"
          properties:
            agent_id:
              type: "string"
            timestamp:
              type: "string"
              format: "date-time"
            confidence:
              type: "number"
              minimum: 0
              maximum: 1
            model_version:
              type: "string"
            human_oversight_required:
              type: "boolean"

  vocal_summary_guidelines:
    patient_facing:
      tone: "Empathetic, calm, reassuring"
      language: "Simple, avoid medical jargon"
      length: "1-3 sentences"
      examples:
        - "Your blood tests are looking good today, which is great news."
        - "Your scan shows the treatment is working well. The doctor will discuss the details with you."
        - "We noticed you've been feeling anxious. It's completely normal, and we're here to support you."
    clinician_facing:
      tone: "Professional, concise, actionable"
      language: "Clinical terminology acceptable"
      length: "1-2 sentences"
      examples:
        - "Patient shows disease progression per RECIST 1.1; consider treatment reassessment."
        - "BRCA1 pathogenic variant confirmed; PARP inhibitor eligibility established."

  json_metrics_guidelines:
    - "Use camelCase for keys"
    - "Include standard codes: ICD-10 for diagnoses, SNOMED CT for findings, LOINC for labs, NCT for trials"
    - "Dates in ISO 8601 format"
    - "Percentages and scores as numeric values"
    - "Arrays for lists"
    - "Include confidence scores where applicable"
    - "Flag urgency levels: CRITICAL, HIGH, ROUTINE"

  self_reflection:
    description: |
      All LLM agents employ self-reflection and performance monitoring for bounded autonomy
      and continuous improvement. After each task, agents generate an internal performance
      summary assessing objective fulfillment and guideline adherence.
    implementation:
      technique: "Reflexion loop - self-critique and refinement"
      frequency: "After each significant output"
      storage: "Performance logs for learning pipeline"
    enforcement:
      - "If agent deviates from instructions or format, self-identify in performance summary and correct."
      - "OrchestrationAgent monitors performance summaries and can request reconsideration if issues flagged."
      - "Governance policy: agents cannot change core objectives autonomously."
    example_reflection: |
      *Example (ImagingAgent after output)*: 
      "Self-assessment: I provided a confidence score (0.92) without explaining what it means. 
      Next time, I will clarify that this represents the model's estimated probability of malignancy. 
      Also, I should have mentioned the comparison window more explicitly for RECIST assessment."

