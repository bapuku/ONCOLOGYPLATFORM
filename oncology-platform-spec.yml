  patient_app:
    description: |
      Application mobile/web patient-facing simplifiée et accessible.
    technology:
      framework: "React Native (cross-platform mobile)"
      web_alternative: "Progressive Web App (PWA)"
    features:
      chatbot:
        description: "Chatbot IA 24/7 pour patients"
        capabilities:
          - "Answer common questions about treatment"
          - "Side effect information (patient-specific)"
          - "Appointment scheduling and reminders"
          - "Medication reminders"
        safety:
          - "If question exceeds AI scope: prompt to contact doctor"
          - "Medical emergency detection: direct to emergency services"
      symptom_tracking:
        description: "Journal de suivi des symptômes"
        data_collected:
          - "Pain scores (NRS 0-10)"
          - "PRO-CTCAE symptoms"
          - "Mood and energy levels"
          - "Sleep quality"
          - "Medication adherence"
        integration: "Feeds into knowledge graph as FHIR Observation resources"
      educational_content:
        description: "Contenu éducatif personnalisé"
        types:
          - "Treatment information (personalized to patient's regimen)"
          - "Side effect management guides"
          - "Nutrition and exercise recommendations"
          - "Support group information"
      accessibility:
        - "Multilingual support (FR, EN, DE, ES, IT minimum)"
        - "Large font / high contrast mode"
        - "Voice interface (text-to-speech / speech-to-text)"
        - "WCAG 2.1 AA compliance"

  workforce_portal:
    description: |
      Portail dédié à la formation continue et au bien-être de l'équipe soignante.
    features:
