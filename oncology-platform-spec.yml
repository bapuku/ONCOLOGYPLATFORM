# SECTION 5: USER INTERFACES
# ============================================================================

user_interfaces:
  clinician_dashboard:
    description: |
      Application web sécurisée (ou intégrée à l'EHR) donnant aux oncologues
      et équipes soignantes un point central d'interaction avec l'IA.
    technology:
      framework: "Next.js 15 (React 19)"
      language: "TypeScript"
      styling: "Tailwind CSS + shadcn/ui"
      state_management: "Zustand + React Query"
      real_time: "WebSocket (Socket.io)"
      charting: "Recharts + D3.js for clinical visualizations"
    features:
      conversational_ai:
        description: "Assistant IA conversationnel intégré"
        capabilities:
          - "Natural language queries about patients"
          - "Evidence-based Q&A with citations"
          - "Compare patient to similar cases"
          - "Generate clinical summaries"
        example_queries:
          - "Compare this patient's case to similar cases in the database"
          - "What does the latest trial data say about second-line therapy after immunotherapy failure?"
          - "Summarize this patient's treatment history"
      ai_insights_panel:
        description: "Panneau d'insights IA en temps réel"
        components:
          - "Risk scores (recurrence, toxicity, hospitalization)"
          - "Flagged events with urgency levels"
          - "Treatment recommendations with evidence ratings"
          - "Clinical trial matches"
          - "Knowledge graph visualizations (patient context)"
      patient_timeline:
        description: "Chronologie interactive des données patient avec annotations IA"
        data_types:
          - "Diagnoses and staging changes"
          - "Treatment cycles with response"
          - "Lab values with trend analysis"
          - "Imaging results with AI annotations"
          - "Patient-reported outcomes"
      genomic_viewer:
        description: "Visualisation des données génomiques"
        features:
          - "Variant interpretation with actionability scores"
          - "Pathway visualization"
          - "Drug-gene interaction matrix"
      feedback_system:
        description: "Système de feedback pour amélioration continue"
