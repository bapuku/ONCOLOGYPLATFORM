      Éditeur visuel no-code permettant aux cliniciens de personnaliser
      les parcours de soins et les règles de support décisionnel.
    technology:
      framework: "React Flow (for visual workflow builder)"
      integration: "Translates to agent rules in OrchestrationAgent"
    features:
