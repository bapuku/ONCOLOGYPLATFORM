    patient_timeline:
      file: "src/components/patient/PatientTimeline.tsx"
      description: "Interactive patient timeline with AI annotations"
      code: |
        'use client';
        
        import { useMemo } from 'react';
        import { Card, CardContent, CardHeader, CardTitle } from '@/components/ui/card';
        import { Badge } from '@/components/ui/badge';
        import { Button } from '@/components/ui/button';
        import { 
          Activity, 
          Pill, 
          Scan, 
          TestTube, 
          FileText, 
          Calendar,
          Bot,
          ChevronDown,
          ChevronUp
        } from 'lucide-react';
        import { format } from 'date-fns';
        import type { TimelineEvent } from '@/lib/types/patient';
        import { useState } from 'react';
        
        interface PatientTimelineProps {
          events: TimelineEvent[];
          onEventClick?: (event: TimelineEvent) => void;
        }
        
        const eventTypeConfig: Record<string, { icon: React.ReactNode; color: string }> = {
          diagnosis: { icon: <FileText className="w-4 h-4" />, color: 'bg-purple-500' },
          treatment: { icon: <Pill className="w-4 h-4" />, color: 'bg-blue-500' },
          imaging: { icon: <Scan className="w-4 h-4" />, color: 'bg-green-500' },
          lab: { icon: <TestTube className="w-4 h-4" />, color: 'bg-yellow-500' },
          procedure: { icon: <Activity className="w-4 h-4" />, color: 'bg-red-500' },
          appointment: { icon: <Calendar className="w-4 h-4" />, color: 'bg-gray-500' },
        };
        
        export function PatientTimeline({ events, onEventClick }: PatientTimelineProps) {
          const [expandedEvents, setExpandedEvents] = useState<Set<string>>(new Set());
          
          const sortedEvents = useMemo(() => 
            [...events].sort((a, b) => 
              new Date(b.date).getTime() - new Date(a.date).getTime()
            ),
            [events]
          );
        
          const toggleExpand = (eventId: string) => {
            setExpandedEvents(prev => {
              const next = new Set(prev);
              if (next.has(eventId)) {
                next.delete(eventId);
              } else {
                next.add(eventId);
              }
              return next;
            });
          };
        
          return (
            <Card>
              <CardHeader>
                <CardTitle className="flex items-center gap-2">
                  <Activity className="w-5 h-5" />
                  Patient Timeline
                </CardTitle>
              </CardHeader>
              <CardContent>
                <div className="relative">
                  {/* Timeline line */}
                  <div className="absolute left-4 top-0 bottom-0 w-0.5 bg-border" />
                  
                  <div className="space-y-6">
                    {sortedEvents.map((event) => {
                      const config = eventTypeConfig[event.type] || eventTypeConfig.appointment;
                      const isExpanded = expandedEvents.has(event.id);
                      
                      return (
                        <div key={event.id} className="relative pl-10">
                          {/* Timeline dot */}
                          <div className={`absolute left-2 w-4 h-4 rounded-full ${config.color} flex items-center justify-center`}>
                            <div className="w-2 h-2 rounded-full bg-white" />
                          </div>
                          
                          <Card 
                            className={`cursor-pointer transition-shadow hover:shadow-md ${
                              event.hasAIAnnotation ? 'ring-1 ring-primary/20' : ''
                            }`}
                            onClick={() => onEventClick?.(event)}
                          >
                            <CardContent className="p-3">
                              <div className="flex items-start justify-between">
                                <div className="flex items-center gap-2">
                                  {config.icon}
                                  <span className="font-medium text-sm">{event.title}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                  {event.hasAIAnnotation && (
                                    <Badge variant="outline" className="text-xs">
                                      <Bot className="w-3 h-3 mr-1" />
                                      AI
                                    </Badge>
                                  )}
                                  <span className="text-xs text-muted-foreground">
                                    {format(new Date(event.date), 'MMM d, yyyy')}
                                  </span>
                                </div>
                              </div>
                              
                              <p className="text-sm text-muted-foreground mt-1">
                                {event.summary}
                              </p>
                              
                              {event.aiInsight && (
                                <div className="mt-2 p-2 bg-primary/5 rounded-md">
                                  <div className="flex items-center gap-1 text-xs text-primary mb-1">
                                    <Bot className="w-3 h-3" />
                                    AI Insight
                                  </div>
                                  <p className="text-xs">{event.aiInsight}</p>
                                </div>
                              )}
                              
                              {event.details && (
                                <>
                                  <Button
                                    variant="ghost"
                                    size="sm"
                                    className="mt-2 h-6 text-xs"
                                    onClick={(e) => {
                                      e.stopPropagation();
                                      toggleExpand(event.id);
                                    }}
                                  >
                                    {isExpanded ? (
                                      <>Less <ChevronUp className="w-3 h-3 ml-1" /></>
                                    ) : (
                                      <>More <ChevronDown className="w-3 h-3 ml-1" /></>
                                    )}
                                  </Button>
                                  
                                  {isExpanded && (
                                    <div className="mt-2 pt-2 border-t">
                                      <pre className="text-xs whitespace-pre-wrap text-muted-foreground">
                                        {JSON.stringify(event.details, null, 2)}
                                      </pre>
                                    </div>
                                  )}
                                </>
                              )}
                            </CardContent>
                          </Card>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </CardContent>
            </Card>
          );
        }

    hooks:
      use_ai_chat:
        file: "src/hooks/useAIChat.ts"
        code: |
          'use client';
          
          import { useState, useCallback } from 'react';
          import { useMutation, useQueryClient } from '@tanstack/react-query';
          import { sendAIMessage } from '@/lib/api/ai';
          import type { AIMessage, AIContext } from '@/lib/types/ai';
          import { v4 as uuidv4 } from 'uuid';
          
          interface UseAIChatOptions {
            patientId?: string;
            context?: 'general' | 'patient' | 'tumor_board';
          }
          
          export function useAIChat({ patientId, context = 'general' }: UseAIChatOptions = {}) {
            const [messages, setMessages] = useState<AIMessage[]>([]);
            const [currentAgent, setCurrentAgent] = useState<string | null>(null);
            const queryClient = useQueryClient();
          
            const mutation = useMutation({
              mutationFn: async (userMessage: string) => {
                const aiContext: AIContext = {
                  patientId,
                  context,
                  conversationHistory: messages.slice(-10), // Last 10 messages for context
                };
                
                return sendAIMessage(userMessage, aiContext);
              },
              onMutate: async (userMessage) => {
                const userMsg: AIMessage = {
                  id: uuidv4(),
                  role: 'user',
                  content: userMessage,
                  timestamp: new Date().toISOString(),
                };
                setMessages((prev) => [...prev, userMsg]);
              },
              onSuccess: (response) => {
                const aiMsg: AIMessage = {
                  id: uuidv4(),
                  role: 'assistant',
                  content: response.situationSummary,
                  timestamp: new Date().toISOString(),
                  agentId: response.agentId,
                  confidence: response.confidence,
                  structuredResponse: {
                    situation_summary: response.situationSummary,
                    supporting_evidence: response.supportingEvidence,
                    json_metrics: response.jsonMetrics,
                    vocal_summary: response.vocalSummary,
                  },
                  reasoning: response.reasoningTrace,
                };
                setMessages((prev) => [...prev, aiMsg]);
                setCurrentAgent(response.agentId);
                
                // Invalidate patient data if relevant
                if (patientId) {
                  queryClient.invalidateQueries({ queryKey: ['patient', patientId] });
                }
              },
              onError: (error) => {
                const errorMsg: AIMessage = {
                  id: uuidv4(),
                  role: 'assistant',
                  content: 'I apologize, but I encountered an error processing your request. Please try again or contact support.',
                  timestamp: new Date().toISOString(),
                  isError: true,
                };
                setMessages((prev) => [...prev, errorMsg]);
              },
            });
          
            const sendMessage = useCallback(
              async (message: string) => {
                await mutation.mutateAsync(message);
              },
              [mutation]
            );
          
            return {
              messages,
              isLoading: mutation.isPending,
              sendMessage,
              currentAgent,
              clearMessages: () => setMessages([]),
            };
          }

      use_real_time_alerts:
        file: "src/hooks/useRealTimeAlerts.ts"
        code: |
          'use client';
          
          import { useEffect, useState, useCallback } from 'react';
          import { io, Socket } from 'socket.io-client';
          import type { AIInsight } from '@/lib/types/ai';
          
          export function useRealTimeAlerts(patientId?: string) {
            const [socket, setSocket] = useState<Socket | null>(null);
            const [isConnected, setIsConnected] = useState(false);
            const [insights, setInsights] = useState<AIInsight[]>([]);
          
            useEffect(() => {
              const socketInstance = io(process.env.NEXT_PUBLIC_WS_URL || 'http://localhost:3001', {
                auth: {
                  // Token would come from auth context
                  token: 'user-token',
                },
                query: {
                  patientId,
                },
              });
          
              socketInstance.on('connect', () => {
                setIsConnected(true);
                console.log('Connected to real-time alerts');
              });
          
              socketInstance.on('disconnect', () => {
                setIsConnected(false);
              });
          
              socketInstance.on('insight', (insight: AIInsight) => {
                setInsights((prev) => {
                  // Avoid duplicates
                  if (prev.some((i) => i.id === insight.id)) return prev;
                  // Keep most recent 50, sorted by timestamp
                  const updated = [insight, ...prev].slice(0, 50);
                  return updated.sort(
                    (a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime()
                  );
                });
              });
          
              socketInstance.on('insight_updated', (updatedInsight: AIInsight) => {
                setInsights((prev) =>
                  prev.map((i) => (i.id === updatedInsight.id ? updatedInsight : i))
                );
              });
          
              setSocket(socketInstance);
          
              return () => {
                socketInstance.disconnect();
              };
            }, [patientId]);
          
            const acknowledgeInsight = useCallback(
              (insightId: string) => {
                if (socket) {
                  socket.emit('acknowledge_insight', { insightId });
                  setInsights((prev) =>
                    prev.map((i) =>
                      i.id === insightId ? { ...i, acknowledged: true } : i
                    )
                  );
                }
              },
              [socket]
            );
          
            return {
              insights,
              isConnected,
              acknowledgeInsight,
            };
          }

