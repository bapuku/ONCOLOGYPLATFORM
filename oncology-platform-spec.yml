      - "Natural language rule creation"
      - "Template library for common oncology workflows"
      - "Trigger-action pairs (IF condition THEN action)"
      - "Custom alert configurations"
    examples:
      - trigger: "Patient pain score > 7 in daily survey"
        action: "Notify palliative care nurse via Slack"
      - trigger: "New pathology report showing XYZ"
        action: "Alert tumor board channel and schedule meeting"
      - trigger: "Patient 48h post-chemo, no symptom report"
        action: "Send WhatsApp check-in message"
      - trigger: "Lab ANC < 1.0 x10^9/L"
