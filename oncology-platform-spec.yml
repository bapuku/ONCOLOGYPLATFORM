cursor_development_instructions:
  overview: |
    Instructions détaillées pour le développement frontend dans Cursor IDE.
    Cette section guide la génération du code React/TypeScript pour les interfaces
    utilisateur de la plateforme oncologique.

  project_setup:
    commands:
      - description: "Create Next.js 15 project with TypeScript"
        command: "npx create-next-app@latest oncoagent-frontend --typescript --tailwind --eslint --app --src-dir --import-alias '@/*'"
      - description: "Install core dependencies"
        command: |
          cd oncoagent-frontend
          npm install @tanstack/react-query zustand socket.io-client
          npm install @radix-ui/react-dialog @radix-ui/react-dropdown-menu @radix-ui/react-tabs
          npm install lucide-react recharts d3
          npm install class-variance-authority clsx tailwind-merge
          npm install @hookform/resolvers zod react-hook-form
          npm install date-fns
      - description: "Install shadcn/ui"
        command: "npx shadcn@latest init"
      - description: "Install shadcn components"
