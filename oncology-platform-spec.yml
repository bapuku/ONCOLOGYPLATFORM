        technology: "Prometheus + Grafana"
        custom_metrics:
          - "ai_inference_latency_seconds"
          - "ai_confidence_score"
          - "rag_retrieval_latency_seconds"
          - "kg_query_latency_seconds"
          - "agent_task_completion_rate"
          - "human_override_rate"
      logging:
        technology: "ELK Stack (Elasticsearch, Logstash, Kibana) or Loki"
        retention: "30 days hot, 1 year cold, 10 years archive"
        structured_logging: "JSON format"
      tracing:
        technology: "Jaeger / OpenTelemetry"
        purpose: "Distributed tracing across microservices and agents"
    alerting:
      technology: "Alertmanager + PagerDuty"
      channels:
        critical: "PagerDuty -> on-call engineer"
        high: "Slack #oncology-platform-alerts"
        warning: "Email to platform team"
      ai_specific_alerts:
        - "Model inference latency > 5s"
        - "Model confidence consistently < 0.7"
        - "RAG retrieval returning empty results"
        - "Agent task failure rate > 5%"
        - "Human override rate spike"
    ai_monitoring:
      model_performance:
        - "Real-time accuracy tracking vs validation set"
        - "Drift detection (input data distribution shift)"
        - "Bias monitoring across demographic groups"
        - "Fairness metrics dashboard"
      explainability_dashboard:
        - "Reasoning path visualization"
        - "Feature importance for predictions"
        - "Knowledge graph traversal logs"

