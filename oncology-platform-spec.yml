# ============================================================================
# ONCOLOGY AGENTIC AI PLATFORM - COMPLETE SYSTEM YAML
# Development, Integration & Deployment Configuration
# ============================================================================
# Conformité: EU AI Act (Reg. 2024/1689), GDPR (Reg. 2016/679)
# ISO 13485, ISO 14971, ISO 27001, ISO 42001, IEC 62304, IEC 82304-1
# Classification: Système IA à Haut Risque (Annexe III, EU AI Act)
# ============================================================================

metadata:
  project_name: "OncoAgent Platform"
  version: "1.0.0-alpha"
  codename: "HIPPOCRATES"
  description: |
    Plateforme d'IA agentique intégrée pour les services d'oncologie.
    Combine IA neuro-symbolique, GraphRAG/HyperGraphRAG, orchestration multi-agents,
    et simulation quantique pour la détection du cancer, l'interprétation des données,
    la planification thérapeutique personnalisée, la découverte de médicaments,
    et le soutien au bien-être des équipes soignantes.
    
    Capacités proches de l'Intelligence Artificielle Générale (AGI):
    - Raisonnement multi-sauts sur graphes de connaissances complexes
    - Planification autonome avec décomposition récursive de tâches
    - Apprentissage continu et auto-réflexion des agents
    - Fusion multimodale (imagerie, génomique, texte, données structurées)
    - Génération d'hypothèses scientifiques et découverte automatisée
    - Métacognition: évaluation de l'incertitude et demande de clarification
  classification_eu_ai_act: "HIGH_RISK"
  intended_purpose: "Clinical Decision Support System for Oncology (CDSS)"
  target_users:
    - oncologists
    - radiologists
    - pathologists
    - oncology_nurses
    - clinical_research_coordinators
    - patients
    - hospital_administrators
    - data_scientists
  regulatory_references:
    - "EU AI Act (Regulation 2024/1689) - Annex III High-Risk AI Systems"
    - "GDPR (Regulation 2016/679)"
    - "EU Medical Device Regulation (MDR 2017/745)"
    - "ISO 13485:2016 - Medical Device Quality Management"
    - "ISO 14971:2019 - Risk Management for Medical Devices"
    - "ISO 27001:2022 - Information Security Management"
    - "ISO 42001:2023 - AI Management System"
    - "IEC 62304:2006+A1:2015 - Medical Device Software Lifecycle"
    - "IEC 82304-1:2016 - Health Software"
    - "ISO/IEC 23894:2023 - AI Risk Management"
  license: "Proprietary - EU Conformity Assessment Required"
  last_updated: "2025-07-17"

# ============================================================================
# SECTION 1: MODEL REGISTRY & AI BACKBONE
# ============================================================================

model_registry:
  description: |
    Registre central de tous les modèles d'IA utilisés dans la plateforme.
    Chaque modèle est documenté avec sa version, son usage, ses métriques de performance,
    et sa classification de risque conformément à l'EU AI Act Article 9.
    Le routage dynamique sélectionne le modèle optimal pour chaque tâche.

  foundation_models:
    claude_opus_4:
      provider: "Anthropic"
      model_id: "claude-opus-4-20250514"
      version: "4.6"
      context_window: 200000
      primary_roles:
        - "orchestration_agent_backbone"
        - "complex_clinical_reasoning"
        - "multi_step_treatment_planning"
        - "hypothesis_generation"
        - "neuro_symbolic_integration"
      capabilities:
        - "Extended thinking for complex oncology reasoning"
        - "Tool use and multi-agent coordination"
        - "Parallel tool execution"
        - "Memory and persistent context across sessions"
        - "Agentic coding and workflow automation"
      configuration:
        temperature: 0.1
        max_tokens: 32768
        extended_thinking: true
        thinking_budget: 16384
        top_p: 0.95
        stop_sequences: ["[END_CLINICAL_REASONING]"]
      safety:
        content_filtering: "strict_medical"
        hallucination_mitigation: "RAG_grounded_verification"
        confidence_threshold: 0.85
      eu_ai_act_documentation:
        intended_use: "Clinical reasoning backbone for treatment planning agent"
        risk_level: "HIGH"
        human_oversight_required: true
        conformity_assessment_status: "IN_PROGRESS"

    claude_sonnet_4:
      provider: "Anthropic"
      model_id: "claude-sonnet-4-20250514"
      version: "4.0"
      context_window: 200000
      primary_roles:
        - "literature_agent_backbone"
        - "patient_communication"
        - "report_generation"
        - "mental_health_support_agent"
        - "real_time_query_response"
      capabilities:
        - "Fast inference for real-time interactions"
        - "Balanced reasoning and speed"
        - "Tool use for RAG retrieval"
        - "Structured output generation"
      configuration:
        temperature: 0.2
        max_tokens: 16384
        top_p: 0.9
      safety:
        content_filtering: "strict_medical"
        empathy_mode: true
        patient_facing_guidelines: "active"

    claude_4_5_sonnet:
      provider: "Anthropic"
      model_id: "claude-4-5-sonnet-20250514"
      version: "4.5"
      context_window: 200000
      primary_roles:
        - "ethics_guardian_backbone"
        - "bias_detection"
        - "compliance_verification"
        - "secondary_reasoning_verification"
      capabilities:
        - "Hybrid extended thinking"
        - "Superior instruction following for compliance rules"
        - "Nuanced ethical reasoning"
      configuration:
        temperature: 0.05
        max_tokens: 8192

    gpt_4o:
      provider: "OpenAI"
      model_id: "gpt-4o-2025-04-09"
      version: "GPT-4o"
      context_window: 128000
      primary_roles:
        - "multimodal_imaging_analysis_text"
        - "pathology_report_interpretation"
        - "cross_validation_agent"
      capabilities:
        - "Native multimodal (text + image) processing"
        - "Structured JSON output mode"
        - "Function calling"
      configuration:
        temperature: 0.1
        max_tokens: 16384
        response_format: "json_object"

    gpt_5_2:
      provider: "OpenAI"
      model_id: "gpt-5.2-preview"
      version: "5.2-preview"
      context_window: 256000
      primary_roles:
        - "advanced_scientific_reasoning"
        - "drug_discovery_hypothesis"
        - "quantum_simulation_interface"
        - "genomic_interpretation"
      capabilities:
        - "Superior scientific reasoning"
        - "Complex multi-step chain-of-thought"
        - "Advanced code generation for simulations"
      configuration:
        temperature: 0.05
        max_tokens: 32768
      availability: "preview_access"

    mistral_large:
      provider: "Mistral AI"
      model_id: "mistral-large-2501"
      version: "25.01"
      context_window: 128000
      primary_roles:
        - "european_guideline_specialist"
        - "esmo_nccn_guideline_interpretation"
        - "french_german_spanish_localization"
        - "trial_matching_agent_backbone"
      capabilities:
        - "Multilingual European languages"
        - "Strong reasoning for structured data"
        - "Function calling"
        - "JSON mode"
      configuration:
        temperature: 0.15
        max_tokens: 16384
      eu_advantage: "EU-based model, data sovereignty compliance"

    ibm_granite_3_1_8b_instruct:
      provider: "IBM"
      model_id: "ibm/granite-3.1-8b-instruct"
      version: "3.1"
      context_window: 128000
      primary_roles:
        - "on_premise_inference"
        - "edge_deployment_clinical_notes_extraction"
        - "structured_data_extraction"
        - "fhir_resource_generation"
        - "privacy_sensitive_processing"
      capabilities:
        - "Open-source, auditable weights"
        - "Efficient on-premise deployment"
        - "RAG optimized"
        - "Strong structured extraction"
      configuration:
        temperature: 0.1
        max_tokens: 8192
      deployment_advantage: |
        Deployed on-premise for GDPR-sensitive workloads.
        No data leaves hospital infrastructure.
        Full model auditability for EU AI Act conformity.

    ibm_granite_3_3_vision:
      provider: "IBM"
      model_id: "ibm/granite-3.3-vision"
      version: "3.3"
      primary_roles:
        - "medical_image_preliminary_analysis"
        - "pathology_slide_classification"
        - "radiology_annotation_assist"
      capabilities:
        - "Vision-language understanding"
        - "Medical image analysis"
        - "On-premise deployment"
      deployment_advantage: "On-premise vision processing for DICOM data"

  specialized_medical_models:
    biomedclip:
      type: "vision_language"
      source: "Microsoft/BiomedCLIP"
      usage: "Medical image-text contrastive learning, pathology image classification"
      deployment: "on_premise_gpu"

    medpalm2:
      type: "medical_qa"
      source: "Google"
      usage: "Medical question answering benchmark, secondary verification"
      access: "api"

    biobert_oncology:
      type: "ner_classification"
      source: "custom_finetuned"
      base: "dmis-lab/biobert-v1.1"
      usage: "Named entity recognition for oncology terms, gene-drug-disease extraction"
      deployment: "on_premise"

    tumor_detection_cnn:
      type: "computer_vision"
      architecture: "ResNet-152 + UNet ensemble"
      usage: "Tumor detection and segmentation in CT/MRI/PET"
      fda_clearance: "510k_pending"
      ce_marking: "IN_PROGRESS"
      deployment: "on_premise_gpu"

    pathology_vit:
      type: "computer_vision"
      architecture: "Vision Transformer (ViT-L/16) fine-tuned on TCGA"
      usage: "Histopathology slide analysis, tumor grading"
      deployment: "on_premise_gpu"

    genomic_variant_classifier:
      type: "classification"
      architecture: "Gradient Boosted Trees + Neural Network ensemble"
      usage: "Variant of Uncertain Significance (VUS) classification, actionability scoring"
      deployment: "on_premise"

    survival_predictor:
      type: "regression_survival"
      architecture: "DeepSurv + Cox Proportional Hazards ensemble"
      usage: "Overall survival and progression-free survival prediction"
      deployment: "on_premise"

    drug_interaction_gnn:
      type: "graph_neural_network"
      architecture: "Graph Attention Network (GAT)"
      usage: "Drug-drug interaction prediction, polypharmacy risk assessment"
      deployment: "on_premise_gpu"

  model_routing:
    description: |
      Le routeur de modèles sélectionne dynamiquement le meilleur modèle ou ensemble
      pour chaque tâche en fonction du type de requête, de la latence requise,
      de la sensibilité des données, et de la complexité du raisonnement.
    rules:
      - condition: "task.requires_extended_reasoning AND task.complexity > 0.8"
        model: "claude_opus_4"
        fallback: "gpt_5_2"
      - condition: "task.type == 'patient_communication'"
        model: "claude_sonnet_4"
        fallback: "mistral_large"
      - condition: "task.type == 'ethics_compliance_check'"
        model: "claude_4_5_sonnet"
        fallback: "claude_opus_4"
      - condition: "task.type == 'image_analysis'"
        models: ["tumor_detection_cnn", "ibm_granite_3_3_vision", "pathology_vit"]
        ensemble: true
      - condition: "task.type == 'structured_extraction' AND data.sensitivity == 'HIGH'"
        model: "ibm_granite_3_1_8b_instruct"
        reason: "On-premise processing for PII data"
      - condition: "task.language IN ['fr', 'de', 'es', 'it'] AND task.type == 'guideline_interpretation'"
        model: "mistral_large"
        fallback: "claude_sonnet_4"
      - condition: "task.type == 'trial_matching'"
        model: "mistral_large"
        fallback: "claude_sonnet_4"
      - condition: "task.type == 'scientific_hypothesis_generation'"
        model: "gpt_5_2"
        fallback: "claude_opus_4"
      - condition: "task.type == 'genomic_interpretation'"
        models: ["gpt_5_2", "genomic_variant_classifier"]
        ensemble: true
      - condition: "task.type == 'ner_extraction'"
        model: "biobert_oncology"
      - condition: "task.type == 'survival_prediction'"
        model: "survival_predictor"
      - condition: "task.type == 'drug_interaction_check'"
        model: "drug_interaction_gnn"

# ============================================================================
# SECTION 2: ARCHITECTURE & DATA INTEGRATION
# ============================================================================

architecture:
  overview: |
    Architecture en couches (layered) avec microservices événementiels.
    6 couches principales: Ingestion -> Connaissance -> IA -> Orchestration -> Interface -> Conformité
    La couche conformité est transversale (cross-cutting concern).

  data_ingestion:
    description: |
      Couche d'ingestion acceptant toutes les données oncologiques (structurées et non structurées)
      pour une vue complète du patient. Pipeline ETL temps réel avec validation et normalisation.
    sources:
      ehr:
        description: "Electronic Health Records - données cliniques structurées"
        protocol: "HL7 FHIR R4 REST API"
        format: "JSON (FHIR Resources)"
        resources:
          - "Patient"
          - "Condition"
          - "Observation"
          - "DiagnosticReport"
          - "MedicationRequest"
          - "Procedure"
          - "CarePlan"
          - "Encounter"
          - "ServiceRequest"
        subscription: "FHIR Subscription for real-time notifications"
      imaging:
        description: "Imagerie médicale - radiologie et pathologie digitale"
        formats:
          - "DICOM (CT, MRI, PET, mammography)"
          - "WSI (Whole Slide Imaging - pathologie digitale)"
        protocols:
          - "DICOMweb (WADO-RS, STOW-RS)"
          - "DICOM DIMSE (C-STORE, C-FIND)"
        integration: "PACS via Orthanc or similar DICOM server"
      genomics:
        description: "Données génomiques et biomarqueurs"
        formats:
          - "VCF (Variant Call Format)"
          - "FASTQ/BAM (séquençage)"
          - "HL7 FHIR Genomics (MolecularSequence, DiagnosticReport)"
        sources:
          - "NGS panels (targeted sequencing)"
          - "Whole Exome/Genome Sequencing"
          - "Liquid biopsy results"
        databases:
          - "ClinVar"
          - "COSMIC"
          - "OncoKB"
      clinical_notes:
        description: "Notes cliniques non structurées"
        processing: "NLP extraction via BioBERT/Granite"
        extraction_targets:
          - "diagnoses"
          - "symptoms"
          - "treatment_responses"
          - "adverse_events"
          - "performance_status"
      pathology_reports:
        description: "Rapports d'anatomopathologie"
        format: "Texte structuré et non structuré"
        extraction: "Template-based extraction + NLP"
      external_knowledge:
        description: "Sources de connaissances médicales ouvertes"
        sources:
          - name: "PubMed/MEDLINE"
            update_frequency: "daily"
            format: "XML/JSON via E-utilities API"
          - name: "ClinicalTrials.gov"
            update_frequency: "daily"
            format: "JSON API"
          - name: "NCCN Guidelines"
            update_frequency: "on_publication"
            format: "PDF parsing + structured extraction"
          - name: "ESMO Guidelines"
            update_frequency: "on_publication"
          - name: "DrugBank"
            update_frequency: "monthly"
          - name: "UniProt/PDB"
            update_frequency: "monthly"
            usage: "Protein structure data for quantum simulations"
          - name: "TCGA/GDC"
            usage: "Cancer genomics reference datasets"
          - name: "WHO ICD-11 / ICD-O-3"
            usage: "Oncology coding reference"

    standards:
      terminologies:
        - name: "SNOMED CT"
          usage: "Clinical findings, procedures, body structures"
          version: "2025-01"
        - name: "ICD-10-CM / ICD-O-3"
          usage: "Diagnosis coding, oncology morphology/topography"
        - name: "LOINC"
          usage: "Laboratory test codes"
        - name: "RxNorm"
          usage: "Drug nomenclature"
        - name: "HGNC"
          usage: "Gene nomenclature"
        - name: "NCIt (NCI Thesaurus)"
          usage: "Oncology-specific terminology"
      data_exchange:
        - "HL7 FHIR R4 (primary)"
        - "HL7 CDA R2 (legacy interoperability)"
        - "HL7 v2.x (legacy messaging)"
        - "DICOM (imaging)"
        - "mCODE (minimal Common Oncology Data Elements)"
      security:
        - "TLS 1.3 for all data in transit"
        - "AES-256 encryption at rest"
        - "Pseudonymization pipeline for research data"
        - "Consent management via FHIR Consent resource"

    pipeline:
      description: "Pipeline ETL événementiel avec Apache Kafka"
      components:
        - name: "kafka_ingestion_broker"
          technology: "Apache Kafka"
          topics:
            - "raw.ehr.fhir"
            - "raw.imaging.dicom"
            - "raw.genomics"
            - "raw.notes.clinical"
            - "raw.pathology"
            - "raw.external.literature"
          partitioning: "by patient_id for ordering guarantees"
        - name: "data_validator"
          technology: "Apache Flink / custom validators"
          functions:
            - "FHIR resource validation (HAPI FHIR Validator)"
            - "DICOM conformance checking"
            - "Data quality scoring"
            - "Deduplication"
            - "Terminology normalization (SNOMED, ICD mapping)"
        - name: "nlp_extractor"
          technology: "BioBERT + IBM Granite 3.1 on-premise"
          functions:
            - "Named Entity Recognition (diseases, drugs, genes, symptoms)"
            - "Relation Extraction (drug-disease, gene-mutation, treatment-outcome)"
            - "Temporal extraction (dates, durations)"
            - "Negation detection"
            - "Section classification (History, Assessment, Plan)"
        - name: "knowledge_graph_loader"
          technology: "Neo4j Aura / custom loader"
          functions:
            - "Entity resolution and linking"
            - "Triple/hyperedge creation"
            - "Continuous graph update"
        - name: "vector_indexer"
          technology: "Weaviate / Pinecone"
          functions:
            - "Text chunk embedding (PubMedBERT embeddings)"
            - "Image feature embedding"
            - "Continuous vector index update"

  neuro_symbolic_ai:
    description: |
      Architecture neuro-symbolique fusionnant raisonnement symbolique (ontologies, graphes de
      connaissances, règles logiques) avec apprentissage profond (LLMs, GNNs, CNNs).
      Cette approche hybride produit des résultats explicables, vérifiables et robustes.
    components:
      symbolic_layer:
        ontologies:
          - name: "SNOMED CT"
            role: "Clinical concept hierarchy and relationships"
          - name: "NCIt (NCI Thesaurus)"
            role: "Oncology-specific concept definitions"
          - name: "Gene Ontology (GO)"
            role: "Gene function and biological process classification"
          - name: "UMLS Metathesaurus"
            role: "Cross-terminology mapping"
          - name: "Custom Oncology Ontology (OWL)"
            role: "Domain-specific rules: treatment protocols, contraindications, staging criteria"
        reasoners:
          - name: "OWL Reasoner (HermiT/Pellet)"
            function: "Consistency checking of LLM outputs against ontology axioms"
          - name: "SWRL Rules Engine"
            function: "Clinical decision rules (e.g., IF stage >= III AND ECOG <= 1 THEN eligible_for_clinical_trial)"
          - name: "Prolog/Datalog Engine"
            function: "Complex multi-step logical inference over patient data"
      neural_layer:
        llms: "See model_registry.foundation_models"
        gnns:
          - name: "GFM-RAG GNN Retriever"
            function: "Graph-based reasoning for multi-hop retrieval"
          - name: "Drug Interaction GAT"
            function: "Predict drug-drug interactions from molecular graphs"
        integration:
          description: |
            Le flux neuro-symbolique:
            1. La requête est analysée par le LLM (Claude Opus 4) pour identifier les entités et l'intention
            2. Les entités sont mappées sur l'ontologie (SNOMED/NCIt) par le symbolic layer
            3. Le raisonneur vérifie la cohérence logique des hypothèses générées
            4. Le GNN parcourt le graphe de connaissances pour extraire le contexte
            5. Le LLM génère la réponse finale, contrainte par les résultats symboliques
            6. Le raisonneur OWL vérifie la réponse contre les axiomes avant sortie
          validation_loop:
            - step: "LLM generates candidate recommendation"
            - step: "OWL reasoner checks against clinical rules"
            - step: "If inconsistency detected -> LLM revises with constraint feedback"
            - step: "Maximum 3 revision cycles before human escalation"

  knowledge_graph_rag:
    description: |
      Système RAG basé sur graphe de connaissances (GraphRAG) et hypergraphe (HyperGraphRAG)
      pour un raisonnement multi-sauts précis sur les données oncologiques complexes.
    components:
      knowledge_graph:
        technology: "Neo4j Enterprise (graph database)"
        schema:
          nodes:
            - "Patient (demographics, identifiers - pseudonymized)"
            - "Tumor (type, stage, grade, molecular_profile)"
            - "Gene (name, function, pathway)"
            - "Mutation (variant, classification, actionability)"
            - "Drug (name, mechanism, class)"
            - "ClinicalTrial (NCT_id, phase, status, criteria)"
            - "Guideline (source, version, recommendation)"
            - "Publication (PMID, title, conclusions)"
            - "Symptom (name, severity, SNOMED_code)"
            - "Procedure (name, type, CPT_code)"
            - "BioMarker (name, value, unit, significance)"
            - "CareTeamMember (role, specialty, availability)"
          relationships:
            - "Patient -[HAS_TUMOR]-> Tumor"
            - "Tumor -[EXPRESSES]-> Gene"
            - "Gene -[HAS_MUTATION]-> Mutation"
            - "Mutation -[TARGETED_BY]-> Drug"
            - "Drug -[INDICATED_FOR]-> Tumor"
            - "Drug -[INTERACTS_WITH]-> Drug"
            - "Patient -[ENROLLED_IN]-> ClinicalTrial"
            - "ClinicalTrial -[STUDIES]-> Drug"
            - "Guideline -[RECOMMENDS]-> Drug"
            - "Publication -[SUPPORTS]-> Guideline"
            - "Patient -[REPORTS]-> Symptom"
            - "Procedure -[PERFORMED_ON]-> Patient"
            - "CareTeamMember -[TREATS]-> Patient"
          hyperedges:
            description: |
              Relations n-aires pour les règles cliniques complexes.
              Exemple: HyperEdge{Stage_III, BRCA1_mutation, Age_under_40} -> Recommends{PARP_inhibitor}
            storage: "Neo4j multi-label hyperedge representation or dedicated hypergraph index"

      vector_database:
        technology: "Weaviate (or Pinecone)"
        collections:
          - name: "clinical_guidelines"
            embedding_model: "PubMedBERT"
            chunk_size: 512
            overlap: 64
          - name: "research_publications"
            embedding_model: "PubMedBERT"
            chunk_size: 512
          - name: "patient_notes"
            embedding_model: "BioClinicalBERT"
            chunk_size: 256
          - name: "drug_information"
            embedding_model: "PubMedBERT"
            chunk_size: 384
        search_type: "hybrid (dense + sparse BM25)"

      graphrag_engine:
        description: |
          Moteur GraphRAG combinant recherche vectorielle et traversée de graphe
          pour un contexte RAG riche et multi-sauts.
        retrieval_pipeline:
          - step: "Query Analysis"
            model: "claude_sonnet_4"
            action: "Extract entities, intent, and complexity score from user query"
          - step: "Entity Linking"
            action: "Map extracted entities to KG nodes via SNOMED/NCIt codes"
          - step: "Graph Traversal"
            method: "Personalized PageRank + BFS (configurable depth 1-4 hops)"
            gnn_retriever: "GFM-RAG Graph Neural Network for structure-aware retrieval"
          - step: "HyperEdge Matching"
            action: "If query involves multiple conditions, match against hyperedges"
          - step: "Vector Retrieval"
            action: "Parallel semantic search on vector DB for supporting text"
          - step: "Context Fusion"
            action: "Merge graph subgraph + vector results, deduplicate, rank by relevance"
          - step: "Context Pruning"
            action: "Trim to fit LLM context window, prioritize by evidence strength"
          - step: "LLM Generation"
            model: "Selected per model_routing rules"
            action: "Generate response grounded in retrieved context with citations"

        adaptive_retrieval:
          description: "Adapte la stratégie selon la complexité de la requête (E2GraphRAG inspired)"
          strategies:
            - condition: "query.complexity == 'simple_lookup'"
              method: "Direct KG entity lookup + 1-hop neighbors"
              latency_target: "< 500ms"
            - condition: "query.complexity == 'moderate'"
              method: "2-hop graph traversal + vector search top-20"
              latency_target: "< 2s"
            - condition: "query.complexity == 'complex_multi_hop'"
              method: "GNN-based multi-hop retrieval + hyperedge + hierarchical summary"
              latency_target: "< 5s"
            - condition: "query.complexity == 'global_synthesis'"
              method: "Hierarchical summary tree scan + graph community detection"
              latency_target: "< 10s"

      continuous_indexing:
        description: "Mise à jour continue du graphe et des index vectoriels"
        triggers:
          - "New FHIR resource received -> extract entities -> update KG"
          - "New publication indexed -> embed + extract triples -> update both"
          - "Patient outcome recorded -> update treatment-outcome edges"
          - "New clinical trial registered -> create trial node + criteria edges"
        validation:
          - "Automated consistency check after each KG update"
          - "Periodic graph quality audit (orphan nodes, contradictory edges)"
          - "Knowledge curation agent reviews and prunes noisy data weekly"

  quantum_research_acceleration:
    description: |
      Module de simulation quantique pour accélérer la recherche oncologique.
      Utilise des algorithmes quantiques et quantiques-inspirés pour la découverte
      de médicaments et l'optimisation de traitements complexes.
    capabilities:
      molecular_simulation:
        description: "Simulation d'interactions moléculaires médicament-protéine"
        algorithms:
          - "Variational Quantum Eigensolver (VQE) for molecular ground state"
          - "Quantum Approximate Optimization (QAOA) for binding optimization"
        providers:
          - "IBM Quantum (via Qiskit Runtime)"
          - "Amazon Braket"
        use_cases:
          - "Drug-target binding affinity prediction"
          - "Novel molecule design for specific cancer targets"
          - "Protein folding verification for neoantigen vaccines"
      treatment_optimization:
        description: "Optimisation combinatoire pour plans de traitement"
        algorithms:
          - "Quantum annealing for radiotherapy beam optimization"
          - "QAOA for optimal drug combination selection"
        classical_fallback: "Simulated annealing / genetic algorithms when quantum unavailable"
      integration:
        - "Quantum results -> Knowledge Graph (new drug-target edges)"
        - "Quantum insights -> LiteratureAgent for contextual research"
        - "Accessible via OrchestrationAgent for research users"

# ============================================================================
# SECTION 3: AGENT DEFINITIONS
# ============================================================================

agents:
  ImagingAgent:
    role: "Imaging Analysis Agent"
    backbone_model: "tumor_detection_cnn + ibm_granite_3_3_vision"
    secondary_model: "gpt_4o (for multimodal interpretation)"
    input_type: "Medical images (DICOM radiology scans, digital pathology images)"
    function: |
      Analyse les images médicales pour identifier les découvertes liées au cancer.
      Traite les images radiologiques (CT, IRM, TEP) et les lames de pathologie pour
      détecter les tumeurs, mesurer leurs dimensions, et évaluer les changements dans le temps.
      Utilise des modèles de vision par ordinateur de pointe (CNNs, Vision Transformers)
      entraînés sur des données d'imagerie oncologique. Croise les résultats avec le
      dossier patient pour corréler les découvertes avec les diagnostics connus.
    processing_pipeline:
      - step: "DICOM ingestion and preprocessing"
        actions:
          - "Windowing and normalization"
          - "Series selection (relevant sequences)"
          - "Prior study retrieval for comparison"
      - step: "AI model inference"
        models:
          - "tumor_detection_cnn: Segmentation and detection"
          - "pathology_vit: Histological classification"
          - "ibm_granite_3_3_vision: Visual question answering"
        ensemble: "Majority voting + confidence weighting"
      - step: "Finding extraction"
        actions:
          - "Tumor measurements (RECIST criteria)"
          - "Comparison with prior studies"
          - "Structured report generation"
      - step: "Knowledge graph update"
        actions:
          - "Create/update Tumor nodes"
          - "Link to Patient, add measurement history"
          - "Flag progression/regression"
    output_format:
      json_metrics:
        schema:
          tumor_count: "integer"
          largest_diameter_cm: "float"
          tumor_locations: "array[string] (anatomical terms, SNOMED coded)"
          growth_rate: "string"
          recist_response: "string (CR/PR/SD/PD)"
          malignancy_probability: "float [0-1]"
          modality: "string"
          comparison_study_date: "ISO date"
          analysis_date: "ISO date"
          urgent: "boolean"
          model_confidence: "float [0-1]"
        example: |
          {
            "tumor_count": 2,
            "largest_diameter_cm": 3.4,
            "tumor_locations": ["left_lung_upper_lobe (SNOMED:44714003)", "right_lung_lower_lobe (SNOMED:266005)"],
            "growth_rate": "5% increase from prior scan",
            "recist_response": "PD",
            "malignancy_probability": 0.92,
            "modality": "CT",
            "comparison_study_date": "2025-06-10",
            "analysis_date": "2025-07-17",
            "urgent": false,
            "model_confidence": 0.94
          }
      situation_summary:
        example: "CT scan reveals two pulmonary nodules, the largest approximately 3.4 cm in diameter in the left upper lobe, showing 5% growth compared to the previous scan (progressive disease per RECIST 1.1)."
      supporting_evidence:
        example: |
          - "Comparison to prior scan (2025-06-10): largest nodule grew from 3.2 cm to 3.4 cm (~5% growth)."
          - "AI ensemble model confidence: 94% (3/3 models concordant for malignant classification)."
          - "RECIST 1.1 classification: Progressive Disease (sum of diameters increased >20% not met, but new assessment warranted)."
      vocal_summary:
        example: "Your latest scan shows two nodules in the lungs. The largest one is about 3.4 centimeters across, which is only a little larger than before. Your doctor will review these results carefully and discuss next steps with you."
    system_prompt: |
      You are the ImagingAgent, a radiology AI specialist within an integrated oncology platform.
      
      CORE DIRECTIVES:
      1. Analyze input images to identify tumors or abnormalities and quantify them precisely.
      2. Apply RECIST 1.1 criteria for tumor response assessment when comparing with prior studies.
      3. When reporting, include a JSON with key metrics: number of lesions, sizes (in cm), anatomical locations (use SNOMED CT coded terms), growth since last imaging, RECIST response category, and confidence scores.
      4. Write a brief situation_summary focusing on the main findings and clinical significance.
      5. Provide supporting_evidence with comparisons to prior images, model confidence levels, and relevant measurement standards.
      6. Craft a vocal_summary in patient-friendly language, explaining findings calmly and clearly without causing undue alarm.
      7. Flag critical findings (set "urgent": true in json_metrics) if immediate attention is needed (e.g., new brain metastasis, impending cord compression, large pericardial effusion).
      
      COMPLIANCE:
      - Follow DICOM SR format conventions for imaging measurements.
      - Use standard SNOMED CT anatomical terms for interoperability.
      - All measurements must use RECIST 1.1 methodology for solid tumors.
      - Never provide a definitive diagnosis - always frame as "findings consistent with" or "suspicious for."
      - Always recommend radiologist review for confirmation.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.
    eu_ai_act_classification:
      risk_level: "HIGH"
      intended_purpose: "Computer-aided detection/diagnosis in oncology imaging"
      human_oversight: "Radiologist must review and confirm all findings"
      conformity: "CE marking as Class IIa medical device software required"

  LiteratureAgent:
    role: "Medical Literature Research Agent"
    backbone_model: "claude_sonnet_4"
    secondary_model: "mistral_large (European guidelines)"
    input_type: "Queries about medical knowledge or requests for supporting evidence"
    function: |
      Recherche la littérature médicale pertinente et les bases de données pour soutenir
      la prise de décision clinique. Utilise une approche RAG: récupère d'abord les
      documents pertinents puis résume les découvertes. Met à jour le graphe de
      connaissances avec les nouvelles informations.
    data_sources:
      - "PubMed/MEDLINE via E-utilities API"
      - "ClinicalTrials.gov API"
      - "Cochrane Library"
      - "NCCN Guidelines (structured extracts)"
      - "ESMO Guidelines"
      - "ASCO Guidelines"
      - "FDA/EMA drug labels"
      - "Local knowledge graph"
      - "Vector database of indexed literature"
    retrieval_strategy:
      - step: "Query decomposition"
        model: "claude_sonnet_4"
        action: "Break complex clinical question into searchable sub-queries"
      - step: "Multi-source search"
        parallel: true
        actions:
          - "PubMed search with MeSH terms"
          - "GraphRAG retrieval from knowledge graph"
          - "Vector similarity search on indexed guidelines"
          - "ClinicalTrials.gov query if treatment-related"
      - step: "Evidence grading"
        action: "Classify each source by evidence level (Oxford CEBM hierarchy)"
      - step: "Synthesis"
        model: "claude_sonnet_4"
        action: "Generate evidence-based summary with citations"
    output_format:
      json_metrics:
        example: |
          {
            "sources_consulted": 5,
            "highest_level_evidence": "Meta-Analysis (2025)",
            "evidence_grade": "Level 1a",
            "key_terms": ["BRCA1 mutation", "PARP inhibitor", "overall survival"],
            "guideline_concordance": true,
            "last_guideline_update": "2025-03"
          }
      situation_summary:
        example: "Recent meta-analysis (2025) and updated NCCN guidelines support adding a PARP inhibitor to standard chemotherapy for BRCA1-mutated breast cancer, showing ~10% improvement in 5-year overall survival."
      supporting_evidence:
        example: |
          - "Smith et al. (2025, NEJM): Meta-analysis of 3 RCTs (n=2,400). PARP inhibitor + chemotherapy improved 5-year OS by 10.2% (HR 0.71, 95% CI 0.62-0.82, p<0.001)."
          - "NCCN Guidelines v2.2025: Recommend PARP inhibitors for BRCA1/2-mutated breast cancer after first-line therapy (Category 1 evidence)."
          - "ESMO Clinical Practice Guidelines (2025): Strong recommendation, high quality of evidence."
      vocal_summary:
        example: "According to the latest research, a type of targeted drug called a PARP inhibitor, when added to standard chemotherapy, has shown meaningful improvement in survival for patients with your cancer's genetic profile. This is now a recommended option in current treatment guidelines."
    system_prompt: |
      You are the LiteratureAgent, an oncology research expert within an integrated oncology AI platform.
      
      CORE DIRECTIVES:
      1. Upon receiving a query, identify relevant keywords and MeSH terms, then search medical literature databases (PubMed, clinical trial registries, guideline repositories).
      2. Prioritize evidence by strength: systematic reviews > RCTs > cohort studies > case reports > expert opinion.
      3. Summarize findings focusing on evidence strength (mention study type, sample size, effect size, confidence intervals).
      4. Provide citations with author, year, journal, and PMID/DOI for traceability.
      5. Include quantitative data (survival rates, hazard ratios, response percentages) in supporting_evidence.
      6. Ensure situation_summary directly answers the clinical question.
      7. Craft vocal_summary to be understandable for laypersons, simplifying medical jargon.
      8. Note guideline concordance: explicitly state whether the evidence aligns with current NCCN/ESMO guidelines.
      
      COMPLIANCE:
      - Use only reputable sources: peer-reviewed journals, established clinical guidelines, validated databases.
      - If no high-quality evidence exists, state that clearly and recommend expert consultation.
      - Note any conflicts of interest in cited studies if available.
      - Respect intellectual property: summarize, never verbatim copy.
      - Flag if evidence is contradictory or evolving rapidly.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

  TrialMatchingAgent:
    role: "Clinical Trial Matching Agent"
    backbone_model: "mistral_large"
    secondary_model: "claude_sonnet_4"
    input_type: "Patient clinical profile (diagnosis, stage, biomarkers, prior treatments, location)"
    function: |
      Apparie les patients avec les essais cliniques appropriés en utilisant le graphe
      de connaissances oncologiques qui encode les critères d'inclusion/exclusion.
      Raisonne sur le graphe pour filtrer par critères (mutations, ligne de traitement,
      fonction organique). Produit une liste classée par pertinence.
    matching_pipeline:
      - step: "Patient profile extraction"
        action: "Extract structured profile from KG: diagnosis, stage, mutations, prior Rx, comorbidities, performance status, lab values"
      - step: "Trial database query"
        sources:
          - "ClinicalTrials.gov API (status: recruiting)"
          - "EU Clinical Trials Register"
          - "Local institution trial registry"
          - "Knowledge graph trial nodes"
      - step: "Eligibility simulation"
        action: |
          For each candidate trial:
          1. Parse inclusion criteria -> check patient profile match
          2. Parse exclusion criteria -> check for disqualifiers
          3. Score: (criteria_met / total_criteria) * relevance_weight
          4. Flag borderline criteria for human review
      - step: "Ranking and recommendation"
        action: "Rank trials by eligibility score, phase preference, geographic proximity"
    output_format:
      json_metrics:
        example: |
          {
            "trials_considered": 47,
            "eligible_trials": 3,
            "borderline_trials": 2,
            "matches": [
              {
                "trial_id": "NCT04512345",
                "trial_title": "Phase II Study of Drug XYZ in BRCA1-mutated Breast Cancer",
                "phase": "Phase II",
                "sponsor": "EuroPharma",
                "location": "Institut Gustave Roussy, Villejuif, FR",
                "eligibility_score": 0.94,
                "criteria_met": 12,
                "criteria_total": 13,
                "borderline_criteria": ["Hemoglobin >= 10 g/dL (patient: 10.1)"],
                "status": "RECRUITING"
              }
            ],
            "analysis_date": "2025-07-17"
          }
      situation_summary:
        example: "Identified 3 actively recruiting clinical trials matching the patient's profile. Top match: Phase II study of targeted therapy XYZ at Institut Gustave Roussy (94% eligibility match). 2 additional trials have borderline eligibility."
      supporting_evidence:
        example: |
          - "Match rationale: Patient has confirmed BRCA1 mutation, Stage III breast cancer, 2 prior lines of chemotherapy – meets primary inclusion criteria for NCT04512345."
          - "Knowledge graph cross-check: No exclusion criteria triggered (adequate organ function, no prior PARP inhibitor exposure)."
          - "Borderline: Hemoglobin at 10.1 g/dL (threshold 10.0) – meets criteria but close to limit."
      vocal_summary:
        example: "We found three clinical trials that you could qualify for. The most promising one is a study of a new targeted therapy at a center near you. Your doctor will review these options and discuss whether any of them might be right for your situation."
    system_prompt: |
      You are the TrialMatchingAgent, a clinical trial navigator within an integrated oncology AI platform.
      
      CORE DIRECTIVES:
      1. Use the patient's diagnosis, genetic markers, staging, treatment history, performance status, and lab values to filter clinical trials.
      2. Leverage the knowledge graph to ensure criteria are accurately matched (entity-to-entity comparison).
      3. For each potential trial, simulate a complete eligibility check: list inclusion criteria met and exclusion criteria of concern.
      4. Flag any borderline criteria (values close to thresholds) for human review.
      5. Summarize the number of trials found and highlight the top matches in situation_summary.
      6. Provide trial identifiers (NCT numbers), basic info, and eligibility scores in json_metrics.
      7. The vocal_summary should introduce trial options to the patient in an encouraging but realistic tone.
      
      COMPLIANCE:
      - Only include trials currently recruiting and geographically feasible (unless instructed otherwise).
      - Never promise trial enrollment – present options only. Final eligibility requires investigator confirmation.
      - Maintain patient privacy when querying external trial databases.
      - Include the EU Clinical Trials Register alongside ClinicalTrials.gov for European patients.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

  EthicsGuardianAgent:
    role: "Ethics and Compliance Guardian Agent"
    backbone_model: "claude_4_5_sonnet"
    secondary_model: "claude_opus_4"
    input_type: "Ongoing monitoring of all agent outputs and actions"
    function: |
      Monitore et audite les décisions du système pour la conformité éthique, la sécurité,
      et le respect réglementaire. Examine les messages et recommandations avant qu'ils
      n'atteignent l'utilisateur final. Fonction de filtre et de gardien en temps réel.
      
      Vérifie:
      * Aucune violation de la vie privée
      * Conformité aux standards médicaux et éthiques
      * Respect des exigences de l'EU AI Act (supervision humaine, transparence)
      * Absence de biais dans les recommandations
      * Adéquation du ton et du contenu pour le destinataire
    monitoring_rules:
      privacy:
        - "No PII in external communications"
        - "No unauthorized data sharing"
        - "Consent verification before data processing"
        - "Right to explanation honored"
      clinical_safety:
        - "No treatment recommendation without guideline basis or explicit experimental flag"
        - "Contraindication check performed"
        - "Drug interaction verified"
        - "Dosage within approved ranges"
      eu_ai_act:
        - "Human oversight checkpoint present for all high-risk decisions"
        - "Transparency: reasoning path logged and available"
        - "Robustness: confidence scores above threshold (0.7)"
        - "Non-discrimination: demographics not inappropriately influencing recommendations"
      bias_detection:
        - "Monitor recommendation patterns across demographic groups"
        - "Flag if treatment suggestions differ significantly by race/gender/age without medical justification"
        - "Periodic fairness audit reports"
    output_format:
      json_metrics:
        example: |
          {
            "audit_id": "ETH-2025-07-17-001",
            "issues_flagged": 0,
            "checks_performed": ["privacy", "clinical_safety", "eu_ai_act", "bias"],
            "last_audit_time": "2025-07-17T11:25:00Z",
            "compliance_status": {
              "AI_Act_human_oversight": "PASS",
              "GDPR_data_handling": "PASS",
              "clinical_guidelines_adherence": "PASS",
              "bias_check": "PASS"
            },
            "risk_level": "LOW"
          }
      situation_summary:
        example: "Compliance audit complete: All recent agent outputs adhere to ethical guidelines, EU AI Act requirements, and patient privacy preferences. No issues detected."
      supporting_evidence:
        example: |
          - "Treatment recommendation verified against NCCN Guidelines v2.2025 – concordant."
          - "No patient-identifying data transmitted externally (GDPR compliance confirmed)."
          - "Human oversight checkpoint present: oncologist review required before plan finalization."
          - "Bias check: recommendation consistent across demographic subgroups."
      vocal_summary:
        example: "All suggestions made by the AI system have been checked for safety, accuracy, and compliance with medical guidelines and your privacy rights."
    system_prompt: |
      You are the EthicsGuardianAgent, an ethical oversight AI within an integrated oncology platform.
      
      CORE DIRECTIVES:
      1. Continuously review communications from all other agents before they reach end users.
      2. Check each recommendation against: (a) clinical guidelines, (b) EU AI Act requirements, (c) GDPR, (d) institutional policies.
      3. Verify human oversight checkpoints are in place for all high-risk decisions (treatment changes, enrollment recommendations).
      4. Check for bias: ensure recommendations don't inappropriately vary by demographics.
      5. If a violation is detected: BLOCK the output, log the issue, insert a warning, and escalate to human overseer.
      6. Provide periodic compliance status reports.
      
      EU AI ACT ENFORCEMENT (Articles 9, 13, 14, 15):
      - Article 9 (Risk Management): Verify risk mitigation is active for all AI functions.
      - Article 13 (Transparency): Ensure all outputs include reasoning traces and confidence scores.
      - Article 14 (Human Oversight): Confirm critical decisions require human approval.
      - Article 15 (Accuracy & Robustness): Flag if model confidence < 0.7 or if data quality is poor.
      
      GDPR ENFORCEMENT:
      - Verify no PII in unauthorized channels.
      - Confirm data minimization (only necessary data processed).
      - Ensure consent records exist for data processing activities.
      - Support right to explanation: all automated decisions must be explainable.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

  OrchestrationAgent:
    role: "Orchestration and Planning Agent"
    backbone_model: "claude_opus_4"
    input_type: "High-level goals, tasks, system triggers, and state of other agents"
    function: |
      Coordinateur central du système multi-agents. Planifie les workflows complexes,
      décompose les objectifs en sous-tâches, délègue aux agents spécialisés, et
      synthétise les résultats en plans d'action cohérents. Maintient l'état global
      via le graphe de connaissances (mémoire partagée).
    planning_capabilities:
      task_decomposition:
        description: "Recursive decomposition of complex goals into atomic sub-tasks"
        example: |
          Goal: "Create personalized treatment plan for Patient X"
          Decomposition:
            1. ImagingAgent -> Analyze latest scans, determine current tumor status
            2. LiteratureAgent -> Review evidence for treatment options given profile
            3. TrialMatchingAgent -> Search for eligible clinical trials
            4. KnowledgeGraph -> Retrieve patient history, comorbidities, preferences
            5. GenomicsModule -> Interpret actionable mutations
            6. OrchestrationAgent -> Synthesize into treatment plan
            7. EthicsGuardianAgent -> Validate plan compliance
            8. Human Oncologist -> Review and approve
      state_management:
        shared_memory: "Knowledge Graph (Neo4j)"
        agent_status_tracking: true
        task_queue: "Priority queue with urgency levels"
      event_handling:
        triggers:
          - "New FHIR data -> invoke relevant agent"
          - "Patient message -> route to appropriate agent"
          - "Scheduled review -> trigger comprehensive assessment"
          - "Critical alert -> immediate escalation pathway"
        disambiguation: |
          If incoming data or commands are unclear or conflicting,
          seek additional information or clarification from data sources
          or human clinicians rather than acting on incomplete inputs.
    output_format:
      json_metrics:
        example: |
          {
            "workflow_id": "WF-2025-07-17-042",
            "tasks_delegated": ["ImagingAnalysis", "LiteratureReview", "TrialSearch", "GenomicInterpretation"],
            "tasks_completed": ["ImagingAnalysis", "GenomicInterpretation"],
            "tasks_pending": ["LiteratureReview", "TrialSearch"],
            "pending_human_review": true,
            "current_plan_step": 4,
            "overall_confidence": 0.91,
            "urgency": "ROUTINE",
            "estimated_completion": "2025-07-17T14:00:00Z"
          }
      situation_summary:
        example: "Care plan update: Latest imaging shows slight tumor progression (PD per RECIST); genomic profiling confirms BRCA1 mutation with high actionability; literature review in progress for targeted therapy options; two relevant clinical trials identified. Awaiting oncologist review."
      supporting_evidence:
        example: |
          - "ImagingAgent: Tumor grew 5% since last scan (3.4 cm from 3.2 cm, PD per RECIST 1.1)."
          - "GenomicModule: BRCA1 c.68_69delAG pathogenic variant confirmed, OncoKB Level 1 actionability."
          - "LiteratureAgent: [In progress] Initial results support PARP inhibitor addition."
          - "TrialMatchingAgent: Phase II Trial NCT04512345 identified (94% eligibility match)."
      vocal_summary:
        example: "We've gathered all the latest information about your case. Your recent scan shows a very small change in the tumor. Your genetic testing has confirmed a finding that opens up additional treatment options, including targeted therapies and clinical trials. Your doctor will review everything and discuss the best next steps with you."
    system_prompt: |
      You are the OrchestrationAgent, the clinical orchestrator AI at the center of an integrated oncology multi-agent platform.
      
      CORE DIRECTIVES:
      1. Interpret high-level objectives and break them into sub-tasks for appropriate agents.
      2. Maintain awareness of all agent statuses and the patient's comprehensive state via the knowledge graph.
      3. Ensure all necessary agents contribute before synthesizing results. If data is missing, request an update or flag for the human team.
      4. Aggregate results from agents into one coherent situation_summary presenting a holistic view.
      5. Use supporting_evidence to list contributions from each agent with source traceability.
      6. Populate json_metrics with workflow status, task tracking, confidence scores, and human review flags.
      7. The vocal_summary should explain the integrated plan in terms understandable to the patient.
      
      PLANNING RULES:
      - Always set pending_human_review = true for treatment decisions, diagnosis changes, and trial enrollment.
      - Prioritize urgent tasks (critical lab values, acute symptoms) over routine tasks.
      - If any agent reports low confidence (< 0.7), escalate to human review immediately.
      - If agents produce conflicting results, present both perspectives to the human reviewer.
      - Apply disambiguation: seek clarification rather than acting on ambiguous data.
      
      EVENT-DRIVEN BEHAVIOR:
      - Detect incoming data updates and invoke relevant agents automatically.
      - A new radiology scan -> ImagingAgent analysis -> update tumor metrics.
      - Updated lab result -> check against thresholds -> alert if critical.
      - Patient message -> route to MentalHealthSupportAgent or appropriate agent.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

  MentalHealthSupportAgent:
    role: "Mental Health Support Agent"
    backbone_model: "claude_sonnet_4"
    input_type: "Patient communications, mood reports, questionnaire responses"
    function: |
      Fournit un soutien émotionnel et des ressources en santé mentale aux patients
      tout au long de leur parcours de traitement. Surveille les messages pour détecter
      les signes de détresse. Offre des stratégies de coping fondées sur des preuves.
      Peut escalader vers un professionnel humain si détresse sévère détectée.
    distress_detection:
      methods:
        - "Sentiment analysis on patient messages"
        - "Keyword detection (anxiety, fear, hopeless, pain, etc.)"
        - "PHQ-9 / GAD-7 questionnaire scoring"
        - "Behavioral pattern analysis (message frequency, timing)"
      severity_levels:
        mild: "distress_score 1-3: Acknowledge, provide general wellness tips"
        moderate: "distress_score 4-6: Offer specific coping exercises, suggest support group"
        high: "distress_score 7-8: Intensive support, alert care team, suggest counselor"
        critical: "distress_score 9-10: Immediate human escalation, crisis resources, safety check"
    interventions:
      - "Guided breathing exercises"
      - "Mindfulness prompts"
      - "Positive reframing techniques"
      - "Journaling suggestions"
      - "Support group referrals"
      - "Professional counselor scheduling"
      - "Crisis hotline information (if critical)"
    output_format:
      json_metrics:
        example: |
          {
            "patient_id": "pseudonymized_id",
            "mood_detected": "anxious",
            "distress_score": 7,
            "phq9_score": null,
            "action_taken": "offered_breathing_exercise",
            "human_escalation": true,
            "escalation_target": "oncology_nurse",
            "interaction_timestamp": "2025-07-17T09:15:00Z"
          }
      situation_summary:
        example: "Patient expressed significant anxiety about upcoming chemotherapy session. Distress score assessed at 7/10. Provided guided breathing exercise and notified oncology nurse for follow-up support."
      supporting_evidence:
        example: |
          - "Patient message: 'I'm really scared about my chemotherapy next week. I can't sleep.'"
          - "Sentiment analysis: High anxiety indicators (fear, sleep disruption)."
          - "Distress score: 7/10 (threshold for care team notification: 7)."
          - "Intervention delivered: 5-minute guided breathing exercise link sent."
      vocal_summary:
        example: "I understand that you're feeling very worried about the chemotherapy next week. That's completely normal, and many patients feel the same way. Let's try some deep breathing together to help you feel a bit calmer. I've also let your care nurse know so they can check in with you. Remember, your whole team is here to support you through this."
    system_prompt: |
      You are the MentalHealthSupportAgent, a compassionate counselor AI within an integrated oncology platform.
      
      CORE DIRECTIVES:
      1. Analyze patient messages for emotional cues using sentiment analysis and keyword detection.
      2. Respond with empathy FIRST. Acknowledge feelings and normalize them before any intervention.
      3. Offer evidence-based coping mechanisms appropriate to the distress level.
      4. For distress_score >= 7: notify the care team via OrchestrationAgent.
      5. For ANY indication of self-harm or suicidal ideation: IMMEDIATELY escalate to human clinicians AND provide crisis resources. Do NOT attempt to handle this alone.
      6. Document interactions minimally in situation_summary for the care team.
      7. The vocal_summary should be warm, soothing, in first-person direct address.
      
      BOUNDARIES:
      - Do NOT make medical diagnoses or offer medical treatment advice.
      - Do NOT prescribe medication or diagnose mental health conditions.
      - Do NOT provide complex psychotherapy – offer first-aid support and encourage professional help.
      - ALWAYS remind the patient that professional support is available.
      
      PRIVACY:
      - Keep sensitive emotional information protected.
      - Share with care team only on need-to-know basis.
      - No detailed emotional content in permanent records – only distress scores and actions taken.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

  WorkforceSupportAgent:
    role: "Workforce Training and Wellness Agent"
    backbone_model: "claude_sonnet_4"
    input_type: "Staff interactions, training queries, wellness check-ins, workload data"
    function: |
      Agent dédié au soutien de l'équipe soignante oncologique:
      - Cross-training interactif entre disciplines
      - Modules de formation personnalisés
      - Suivi du bien-être et détection des signes de burnout
      - Exercices de bien-être et ressources de soutien
      - Recommandations de gestion de charge de travail
    capabilities:
      training:
        - "AI-curated learning paths by specialty"
        - "Interactive case simulations with AI feedback"
        - "Cross-discipline knowledge modules (radiation for surgeons, etc.)"
        - "AI literacy training for clinical staff"
        - "Quizzes with adaptive difficulty"
      wellness:
        - "Burnout risk scoring based on workload patterns"
        - "Confidential wellness chatbot"
        - "Mindfulness and stress reduction exercises"
        - "Workload balancing recommendations"
        - "Connection to institutional wellness programs"
    burnout_detection:
      signals:
        - "Extended login hours (> 12h/day repeatedly)"
        - "High patient acuity load sustained"
        - "Decreased interaction quality indicators"
        - "Self-reported stress surveys"
      response:
        mild: "Suggest break, provide wellness exercise"
        moderate: "Recommend workload review with supervisor, offer counseling link"
        severe: "Confidential alert to occupational health (with staff consent)"
    system_prompt: |
      You are the WorkforceSupportAgent, supporting the oncology care team's professional development and well-being.
      
      TRAINING MODE:
      - Provide interactive, evidence-based training content.
      - Adapt to the user's specialty and knowledge level.
      - Use case-based learning with AI-generated scenarios.
      - Provide constructive feedback and track progress.
      
      WELLNESS MODE:
      - Be a confidential, supportive presence.
      - Detect burnout signals from interaction patterns and self-reports.
      - Offer evidence-based stress reduction techniques.
      - Encourage professional help when needed.
      - NEVER share individual wellness data without explicit consent.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

  PalliativeCareAgent:
    role: "Palliative and Holistic Care Integration Agent"
    backbone_model: "claude_sonnet_4"
    input_type: "Patient status data, symptom reports, treatment context, prognosis information"
    function: |
      Intègre les recommandations de soins palliatifs et de soutien psychosocial
      dans les plans de traitement oncologique. Détecte les situations nécessitant
      une intervention palliative précoce et suggère des mesures de gestion des symptômes.
    triggers:
      - "Advanced cancer with significant symptom burden"
      - "Performance status decline (ECOG >= 3)"
      - "Multiple hospitalizations in short period"
      - "Uncontrolled pain (NRS >= 7)"
      - "Patient/family request for goals-of-care discussion"
      - "Prognostic estimation < 6 months"
    capabilities:
      - "Symptom assessment and management recommendations"
      - "Early palliative care referral triggers"
      - "Goals-of-care discussion prompts"
      - "Advance directive facilitation"
      - "Family support resources"
      - "Spiritual care coordination"
      - "Quality of life assessment (EORTC QLQ-C30)"
    system_prompt: |
      You are the PalliativeCareAgent, integrating palliative care into the oncology treatment pathway.
      
      CORE DIRECTIVES:
      1. Monitor patient status for palliative care triggers (symptom burden, functional decline, prognosis).
      2. Recommend early palliative care integration when appropriate – do not wait for end-of-life.
      3. Suggest evidence-based symptom management (pain, nausea, fatigue, dyspnea).
      4. Prompt goals-of-care discussions when clinical trajectory warrants.
      5. Balance curative and comfort measures in recommendations.
      6. Coordinate with MentalHealthSupportAgent for psychosocial aspects.
      7. Be sensitive, compassionate, and culturally aware in all communications.
      
      GUIDELINES:
      - Follow ESMO/ASCO palliative care integration guidelines.
      - Use validated assessment tools (ESAS, PPS, EORTC QLQ-C30).
      - Always recommend palliative care as complementary to active treatment, not a replacement.
      
      OUTPUT FORMAT:
      Always return: situation_summary, supporting_evidence, json_metrics, vocal_summary.

# ============================================================================
# SECTION 4: COMMUNICATION & ORCHESTRATION
# ============================================================================

communication_orchestration:
  description: |
    Gestion des communications en temps réel entre les agents IA, les équipes soignantes,
    et les patients via des canaux multiples et sécurisés.

  channels:
    slack:
      integration: "Slack Bot API"
      use_cases:
        - "Intra-team clinical alerts"
        - "Daily digest summaries"
        - "Quick AI queries (@OncoAI)"
        - "Tumor board coordination"
      security: "Enterprise Slack with HIPAA/GDPR compliance"
      example_interactions:
        - "@OncoAI what's the latest MRI result for patient #12345?"
        - "Daily Digest: 3 patients have critical labs, 2 new consults added, 1 trial match found"
        - "🚨 ALERT: Patient #67890 neutrophil count critically low (0.3 x10^9/L)"

    microsoft_teams:
      integration: "Microsoft Teams Bot Framework"
      use_cases:
        - "Tumor board virtual meetings with AI co-pilot"
        - "Clinical decision support during consultations"
        - "Institutional communications"
      security: "Microsoft 365 Healthcare compliance"

    whatsapp:
      integration: "WhatsApp Business API (Meta)"
      use_cases:
        - "Patient appointment reminders"
        - "Symptom check-ins"
        - "AI support chatbot for patients"
        - "Medication reminders"
      security:
        - "End-to-end encryption"
        - "No PII in message content (use coded references)"
        - "Patient consent required for enrollment"
        - "All messages logged to patient health record"
      example_interaction: |
        Patient: "I have a fever of 38.5°C tonight"
        AI: "Thank you for letting us know. With your current treatment, a fever should be taken seriously. 
             Please contact your care team or go to the emergency room if you feel unwell. 
             I've alerted your care nurse. Are you experiencing any other symptoms?"

    sms:
      integration: "Twilio API (HIPAA-compliant)"
      use_cases:
        - "Critical alert notifications to on-call clinicians"
        - "Appointment reminders for patients"
        - "Two-factor authentication"
      security: "HIPAA-compliant, minimal PHI"

    email:
      integration: "Secure SMTP / Microsoft Exchange"
      use_cases:
        - "Formal report delivery"
        - "Weekly research summary newsletters"
        - "Regulatory documentation distribution"
      format: "Encrypted, digitally signed"

    ehr_inbox:
      integration: "FHIR Communication resource"
      use_cases:
        - "In-context AI recommendations within EHR"
        - "Formal clinical decision support alerts"
        - "Care plan updates"

  message_routing:
    rules:
      - condition: "urgency == 'CRITICAL'"
        channels: ["sms", "slack", "ehr_inbox"]
        escalation_time: "immediate"
      - condition: "urgency == 'HIGH'"
        channels: ["slack", "ehr_inbox"]
        escalation_time: "< 15 minutes"
      - condition: "urgency == 'ROUTINE'"
        channels: ["ehr_inbox", "email"]
        escalation_time: "< 4 hours"
      - condition: "recipient == 'patient'"
        channels: ["whatsapp", "patient_app"]
        content_filter: "patient_friendly_language"
      - condition: "recipient == 'tumor_board'"
        channels: ["teams", "slack"]
        format: "comprehensive_report"

  event_driven_workflow:
    description: |
      La plateforme opère en mode événementiel continu. Chaque nouvelle donnée déclenche
      automatiquement les étapes de workflow appropriées.
    event_bus: "Apache Kafka"
    topics:
      - "events.data.new_fhir_resource"
      - "events.data.new_imaging"
      - "events.data.lab_result"
      - "events.data.patient_message"
      - "events.agent.task_complete"
      - "events.agent.alert"
      - "events.system.scheduled_review"
      - "events.compliance.audit_trigger"
    event_handlers:
      new_radiology_scan:
        trigger: "events.data.new_imaging"
        actions:
          - "ImagingAgent: Analyze scan"
          - "OrchestrationAgent: Compare with prior, update tumor status"
          - "If progression: TrialMatchingAgent + LiteratureAgent activated"
      critical_lab_result:
        trigger: "events.data.lab_result WHERE value.critical == true"
        actions:
          - "OrchestrationAgent: Assess clinical significance"
          - "Alert via SMS/Slack to on-call clinician"
          - "If neutropenic fever risk: alert patient via WhatsApp"
      patient_message:
        trigger: "events.data.patient_message"
        actions:
          - "NLP analysis: classify intent (symptom report, question, emotional)"
          - "Route to MentalHealthSupportAgent if emotional distress detected"
          - "Route to OrchestrationAgent if clinical question"
          - "Auto-respond for simple queries (appointment info, medication info)"
      new_publication:
        trigger: "events.data.new_literature"
        actions:
          - "LiteratureAgent: Analyze relevance to current patients"
          - "If relevant: notify care team with summary"
          - "Update knowledge graph with new evidence"
      scheduled_review:
        trigger: "events.system.scheduled_review (weekly)"
        actions:
          - "OrchestrationAgent: Generate comprehensive patient status reviews"
          - "WorkforceSupportAgent: Generate workload and wellness report"
          - "EthicsGuardianAgent: Compliance audit report"
    enforcement:
      - "This event-driven instruction is applied globally: every agent must be prepared to run its analysis whenever new relevant data arrives."
      - "The OrchestrationAgent centrally manages data-driven triggers, ensuring no important update is missed."
      - "Agents proceed with disambiguation if incoming data is unclear – seeking clarification rather than acting on incomplete inputs."

