      sample_code:
        main_py: |
          from fastapi import FastAPI, HTTPException, Depends
          from fastapi.middleware.cors import CORSMiddleware
          from contextlib import asynccontextmanager
          import structlog
          
          from app.config import settings
          from app.routers import ai, agents, workflows
          from app.knowledge.neo4j_client import Neo4jClient
          from app.knowledge.weaviate_client import WeaviateClient
          from app.models.llm_router import LLMRouter
          
          logger = structlog.get_logger()
          
          @asynccontextmanager
          async def lifespan(app: FastAPI):
              # Startup
              logger.info("Starting OncoAgent Orchestration Service")
              app.state.neo4j = Neo4jClient(settings.NEO4J_URI, settings.NEO4J_USER, settings.NEO4J_PASSWORD)
              app.state.weaviate = WeaviateClient(settings.WEAVIATE_URL)
              app.state.llm_router = LLMRouter()
              yield
              # Shutdown
              logger.info("Shutting down OncoAgent Orchestration Service")
              await app.state.neo4j.close()
              await app.state.weaviate.close()
          
          app = FastAPI(
              title="OncoAgent Orchestration Service",
              description="Multi-agent orchestration for oncology AI platform",
              version="1.0.0",
              lifespan=lifespan,
          )
          
          app.add_middleware(
              CORSMiddleware,
              allow_origins=settings.ALLOWED_ORIGINS,
              allow_credentials=True,
              allow_methods=["*"],
              allow_headers=["*"],
          )
          
          app.include_router(ai.router, prefix="/api/v1/ai", tags=["AI"])
          app.include_router(agents.router, prefix="/api/v1/agents", tags=["Agents"])
          app.include_router(workflows.router, prefix="/api/v1/workflows", tags=["Workflows"])
          
          @app.get("/health")
          async def health_check():
              return {
                  "status": "healthy",
                  "version": "1.0.0",
                  "services": {
                      "neo4j": "connected",
                      "weaviate": "connected",
                      "llm_router": "ready"
                  }
              }

        orchestrator_agent: |
          from typing import Dict, List, Optional, Any
          from pydantic import BaseModel
          import structlog
          from app.agents.base import BaseAgent, AgentResponse
          from app.models.llm_router import LLMRouter
          from app.rag.graph_rag import GraphRAGEngine
          from app.rag.context_builder import ContextBuilder
          from app.knowledge.ontology_validator import OntologyValidator
          
          logger = structlog.get_logger()
          
          class TaskDecomposition(BaseModel):
              task_id: str
              agent: str
              description: str
              priority: int
              dependencies: List[str] = []
          
          class OrchestrationPlan(BaseModel):
              workflow_id: str
              goal: str
              tasks: List[TaskDecomposition]
              estimated_duration_seconds: int
          
          class OrchestrationAgent(BaseAgent):
              """
              Central orchestration agent that coordinates all other agents.
              Implements the core planning and task delegation logic.
              """
              
              AGENT_ID = "OrchestrationAgent"
              BACKBONE_MODEL = "claude_opus_4"
              
              def __init__(
                  self,
                  llm_router: LLMRouter,
                  graph_rag: GraphRAGEngine,
                  context_builder: ContextBuilder,
                  ontology_validator: OntologyValidator,
              ):
                  self.llm_router = llm_router
                  self.graph_rag = graph_rag
                  self.context_builder = context_builder
                  self.ontology_validator = ontology_validator
                  self._agent_registry: Dict[str, BaseAgent] = {}
              
              def register_agent(self, agent: BaseAgent):
                  """Register a specialized agent for task delegation."""
                  self._agent_registry[agent.AGENT_ID] = agent
                  logger.info(f"Registered agent: {agent.AGENT_ID}")
              
              async def plan_workflow(
                  self,
                  goal: str,
                  patient_id: Optional[str] = None,
                  context: Optional[Dict[str, Any]] = None,
              ) -> OrchestrationPlan:
                  """
                  Decompose a high-level goal into a sequence of agent tasks.
                  Uses the backbone LLM with extended thinking for complex planning.
                  """
                  
                  # Build context from knowledge graph
                  kg_context = await self.context_builder.build_patient_context(patient_id) if patient_id else {}
                  
                  planning_prompt = f"""
                  You are the OrchestrationAgent for an oncology AI platform.
                  
                  GOAL: {goal}
                  
                  PATIENT CONTEXT:
                  {kg_context}
                  
                  ADDITIONAL CONTEXT:
                  {context}
                  
                  AVAILABLE AGENTS:
                  {list(self._agent_registry.keys())}
                  
                  Decompose this goal into specific tasks for the available agents.
                  Consider dependencies between tasks (e.g., ImagingAgent results may inform LiteratureAgent queries).
                  
                  Return a JSON plan with:
                  - workflow_id: unique identifier
                  - goal: the original goal
                  - tasks: list of tasks, each with:
                    - task_id: unique task identifier
                    - agent: which agent should handle this
                    - description: what the agent should do
                    - priority: 1 (highest) to 5 (lowest)
                    - dependencies: list of task_ids that must complete first
                  - estimated_duration_seconds: total expected time
                  """
                  
                  response = await self.llm_router.generate(
                      prompt=planning_prompt,
                      model_id=self.BACKBONE_MODEL,
                      extended_thinking=True,
                      response_format="json",
                  )
                  
                  return OrchestrationPlan.model_validate_json(response.content)
              
              async def execute_workflow(
                  self,
                  plan: OrchestrationPlan,
                  patient_id: Optional[str] = None,
              ) -> AgentResponse:
                  """
                  Execute a workflow plan, delegating tasks to appropriate agents.
                  Handles task dependencies and aggregates results.
                  """
                  
                  results: Dict[str, AgentResponse] = {}
                  completed_tasks: set = set()
                  
                  # Sort tasks by priority and dependencies
                  pending_tasks = sorted(plan.tasks, key=lambda t: t.priority)
                  
                  while pending_tasks:
                      # Find tasks with all dependencies satisfied
                      ready_tasks = [
                          t for t in pending_tasks
                          if all(dep in completed_tasks for dep in t.dependencies)
                      ]
                      
                      if not ready_tasks:
                          logger.error("Workflow deadlock - circular dependencies")
                          break
                      
                      # Execute ready tasks (could be parallel in production)
                      for task in ready_tasks:
                          agent = self._agent_registry.get(task.agent)
                          if not agent:
                              logger.warning(f"Agent not found: {task.agent}")
                              continue
                          
                          # Get dependency results for context
                          dependency_context = {
                              dep_id: results[dep_id].json_metrics
                              for dep_id in task.dependencies
                              if dep_id in results
                          }
                          
                          result = await agent.execute(
                              task_description=task.description,
                              patient_id=patient_id,
                              context=dependency_context,
                          )
                          
                          results[task.task_id] = result
                          completed_tasks.add(task.task_id)
                          pending_tasks.remove(task)
                      
                      logger.info(f"Completed tasks: {len(completed_tasks)}/{len(plan.tasks)}")
                  
                  # Synthesize final response
                  return await self._synthesize_results(plan, results)
              
              async def _synthesize_results(
                  self,
                  plan: OrchestrationPlan,
                  results: Dict[str, AgentResponse],
              ) -> AgentResponse:
                  """Combine results from multiple agents into a cohesive response."""
                  
                  synthesis_prompt = f"""
                  Synthesize the following agent results into a cohesive care plan summary.
                  
                  ORIGINAL GOAL: {plan.goal}
                  
                  AGENT RESULTS:
                  {self._format_results_for_synthesis(results)}
                  
                  Create a unified response following the standard output format:
                  - situation_summary: Integrated summary of all findings
                  - supporting_evidence: Combined evidence from all agents
                  - json_metrics: Aggregated metrics
                  - vocal_summary: Patient-friendly summary
                  
                  Ensure human oversight is flagged if any agent recommended it.
                  """
                  
                  response = await self.llm_router.generate(
                      prompt=synthesis_prompt,
                      model_id=self.BACKBONE_MODEL,
                      response_format="json",
                  )
                  
                  return AgentResponse.model_validate_json(response.content)
              
              def _format_results_for_synthesis(self, results: Dict[str, AgentResponse]) -> str:
                  formatted = []
                  for task_id, result in results.items():
                      formatted.append(f"""
                      === {result.agent_id} (Task: {task_id}) ===
                      Summary: {result.situation_summary}
                      Evidence: {result.supporting_evidence}
                      Confidence: {result.confidence}
                      Human Oversight Required: {result.human_oversight_required}
                      """)
                  return "\n".join(formatted)

        graph_rag_engine: |
          from typing import List, Dict, Any, Optional
          from pydantic import BaseModel
          import structlog
          from app.knowledge.neo4j_client import Neo4jClient
          from app.knowledge.weaviate_client import WeaviateClient
          
          logger = structlog.get_logger()
          
          class RetrievalResult(BaseModel):
              source: str
              content: str
              relevance_score: float
              metadata: Dict[str, Any] = {}
          
          class GraphRAGContext(BaseModel):
              query: str
              graph_subgraph: List[Dict[str, Any]]
              vector_results: List[RetrievalResult]
              hyperedge_matches: List[Dict[str, Any]]
              total_tokens: int
          
          class GraphRAGEngine:
              """
              GraphRAG implementation combining knowledge graph traversal
              with vector similarity search for context retrieval.
              """
              
              def __init__(
                  self,
                  neo4j_client: Neo4jClient,
                  weaviate_client: WeaviateClient,
                  max_hops: int = 3,
                  max_context_tokens: int = 16000,
              ):
                  self.neo4j = neo4j_client
                  self.weaviate = weaviate_client
                  self.max_hops = max_hops
                  self.max_context_tokens = max_context_tokens
              
              async def retrieve(
                  self,
                  query: str,
                  patient_id: Optional[str] = None,
                  complexity: str = "moderate",
              ) -> GraphRAGContext:
                  """
                  Retrieve relevant context using adaptive GraphRAG strategy.
                  
                  Strategies based on complexity:
                  - simple: Direct entity lookup + 1-hop
                  - moderate: 2-hop traversal + vector top-20
                  - complex: GNN multi-hop + hyperedge + summary
                  """
                  
                  # Step 1: Extract entities from query
                  entities = await self._extract_entities(query)
                  logger.info(f"Extracted entities: {entities}")
                  
                  # Step 2: Graph traversal based on complexity
                  if complexity == "simple":
                      graph_context = await self._simple_retrieval(entities, patient_id)
                  elif complexity == "moderate":
                      graph_context = await self._moderate_retrieval(entities, patient_id)
                  else:
                      graph_context = await self._complex_retrieval(entities, patient_id)
                  
                  # Step 3: Vector search for supporting text
                  vector_results = await self._vector_search(query, top_k=20)
                  
                  # Step 4: Hyperedge matching for n-ary relations
                  hyperedge_matches = await self._match_hyperedges(entities)
                  
                  # Step 5: Combine and prune to fit context window
                  return await self._build_context(
                      query=query,
                      graph_subgraph=graph_context,
                      vector_results=vector_results,
                      hyperedge_matches=hyperedge_matches,
                  )
              
              async def _extract_entities(self, query: str) -> List[Dict[str, str]]:
                  """Extract medical entities from query using BioBERT NER."""
                  # In production, this would call the BioBERT NER service
                  # For now, returning placeholder
                  return [
                      {"text": "BRCA1", "type": "Gene"},
                      {"text": "breast cancer", "type": "Disease"},
                  ]
              
              async def _simple_retrieval(
                  self,
                  entities: List[Dict[str, str]],
                  patient_id: Optional[str],
              ) -> List[Dict[str, Any]]:
                  """Direct entity lookup with 1-hop neighbors."""
                  
                  cypher = """
                  MATCH (n)-[r]-(m)
                  WHERE n.name IN $entity_names
                  RETURN n, r, m
                  LIMIT 100
                  """
                  
                  entity_names = [e["text"] for e in entities]
                  return await self.neo4j.query(cypher, {"entity_names": entity_names})
              
              async def _moderate_retrieval(
                  self,
                  entities: List[Dict[str, str]],
                  patient_id: Optional[str],
              ) -> List[Dict[str, Any]]:
                  """2-hop traversal with Personalized PageRank."""
                  
                  cypher = """
                  MATCH path = (n)-[*1..2]-(m)
                  WHERE n.name IN $entity_names
                  WITH path, [rel in relationships(path) | type(rel)] as rel_types
                  RETURN path, rel_types
                                    LIMIT 200
                  """
                  
                  entity_names = [e["text"] for e in entities]
                  results = await self.neo4j.query(cypher, {"entity_names": entity_names})
                  
                  # Apply Personalized PageRank for relevance ranking
                  if patient_id:
                      ppr_cypher = """
                      CALL gds.pageRank.stream('oncologyGraph', {
                          sourceNodes: [MATCH (p:Patient {id: $patient_id}) RETURN id(p)],
                          maxIterations: 20,
                          dampingFactor: 0.85
                      })
                      YIELD nodeId, score
                      RETURN gds.util.asNode(nodeId) AS node, score
                      ORDER BY score DESC
                      LIMIT 50
                      """
                      ppr_results = await self.neo4j.query(ppr_cypher, {"patient_id": patient_id})
                      results.extend(ppr_results)
                  
                  return results
              
              async def _complex_retrieval(
                  self,
                  entities: List[Dict[str, str]],
                  patient_id: Optional[str],
              ) -> List[Dict[str, Any]]:
                  """Multi-hop GNN-based retrieval with hierarchical summary."""
                  
                  # Get multi-hop paths
                  cypher = """
                  MATCH path = (n)-[*1..4]-(m)
                  WHERE n.name IN $entity_names
                  WITH path, 
                       [node in nodes(path) | labels(node)[0]] as node_types,
                       [rel in relationships(path) | type(rel)] as rel_types,
                       length(path) as path_length
                  RETURN path, node_types, rel_types, path_length
                  ORDER BY path_length ASC
                  LIMIT 500
                  """
                  
                  entity_names = [e["text"] for e in entities]
                  paths = await self.neo4j.query(cypher, {"entity_names": entity_names})
                  
                  # Get community summaries for global context
                  summary_cypher = """
                  MATCH (c:Community)-[:CONTAINS]->(n)
                  WHERE n.name IN $entity_names
                  RETURN c.summary as summary, c.level as level
                  ORDER BY c.level DESC
                  """
                  summaries = await self.neo4j.query(summary_cypher, {"entity_names": entity_names})
                  
                  return paths + summaries
              
              async def _vector_search(
                  self,
                  query: str,
                  top_k: int = 20,
              ) -> List[RetrievalResult]:
                  """Hybrid vector search (dense + BM25)."""
                  
                  results = await self.weaviate.hybrid_search(
                      collection="clinical_guidelines",
                      query=query,
                      limit=top_k,
                      alpha=0.7,  # Weight towards dense vectors
                  )
                  
                  return [
                      RetrievalResult(
                          source=r["source"],
                          content=r["content"],
                          relevance_score=r["score"],
                          metadata=r.get("metadata", {}),
                      )
                      for r in results
                  ]
              
              async def _match_hyperedges(
                  self,
                  entities: List[Dict[str, str]],
              ) -> List[Dict[str, Any]]:
                  """Match n-ary relations in hypergraph."""
                  
                  cypher = """
                  MATCH (h:HyperEdge)-[:CONNECTS]->(n)
                  WHERE n.name IN $entity_names
                  WITH h, collect(n) as connected_nodes
                  WHERE size(connected_nodes) >= 2
                  RETURN h.relation_type as relation_type,
                         h.content as content,
                         [node in connected_nodes | node.name] as entities,
                         h.source as source
                  """
                  
                  entity_names = [e["text"] for e in entities]
                  return await self.neo4j.query(cypher, {"entity_names": entity_names})
              
              async def _build_context(
                  self,
                  query: str,
                  graph_subgraph: List[Dict[str, Any]],
                  vector_results: List[RetrievalResult],
                  hyperedge_matches: List[Dict[str, Any]],
              ) -> GraphRAGContext:
                  """Combine and prune results to fit context window."""
                  
                  # Estimate tokens and prune if needed
                  total_tokens = 0
                  pruned_graph = []
                  pruned_vector = []
                  pruned_hyperedges = []
                  
                  # Prioritize: hyperedges > high-relevance vector > graph paths
                  for he in hyperedge_matches:
                      tokens = len(str(he)) // 4  # Rough token estimate
                      if total_tokens + tokens < self.max_context_tokens:
                          pruned_hyperedges.append(he)
                          total_tokens += tokens
                  
                  for vr in sorted(vector_results, key=lambda x: x.relevance_score, reverse=True):
                      tokens = len(vr.content) // 4
                      if total_tokens + tokens < self.max_context_tokens:
                          pruned_vector.append(vr)
                          total_tokens += tokens
                  
                  for node in graph_subgraph:
                      tokens = len(str(node)) // 4
                      if total_tokens + tokens < self.max_context_tokens:
                          pruned_graph.append(node)
                          total_tokens += tokens
                  
                  return GraphRAGContext(
                      query=query,
                      graph_subgraph=pruned_graph,
                      vector_results=pruned_vector,
                      hyperedge_matches=pruned_hyperedges,
                      total_tokens=total_tokens,
                  )

