  key_components:
    ai_chat_interface:
      file: "src/components/ai/AIChatInterface.tsx"
      description: "Main conversational AI interface for clinicians"
      code: |
        'use client';
        
        import { useState, useRef, useEffect } from 'react';
        import { useAIChat } from '@/hooks/useAIChat';
        import { Button } from '@/components/ui/button';
        import { Input } from '@/components/ui/input';
        import { ScrollArea } from '@/components/ui/scroll-area';
        import { Card, CardContent, CardHeader, CardTitle } from '@/components/ui/card';
        import { Badge } from '@/components/ui/badge';
        import { Loader2, Send, Bot, User, AlertCircle, CheckCircle2 } from 'lucide-react';
        import { ReasoningTrace } from './ReasoningTrace';
        import { ConfidenceBadge } from './ConfidenceBadge';
        import type { AIMessage, AgentResponse } from '@/lib/types/ai';
        
        interface AIChatInterfaceProps {
          patientId?: string;
          context?: 'general' | 'patient' | 'tumor_board';
        }
        
        export function AIChatInterface({ patientId, context = 'general' }: AIChatInterfaceProps) {
          const [input, setInput] = useState('');
          const scrollRef = useRef<HTMLDivElement>(null);
          const { messages, isLoading, sendMessage, currentAgent } = useAIChat({ patientId, context });
        
          useEffect(() => {
            if (scrollRef.current) {
              scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }
          }, [messages]);
        
          const handleSubmit = async (e: React.FormEvent) => {
            e.preventDefault();
            if (!input.trim() || isLoading) return;
            await sendMessage(input);
            setInput('');
          };
        
          const renderMessage = (message: AIMessage) => {
            const isUser = message.role === 'user';
            
            return (
              <div
                key={message.id}
                className={`flex gap-3 ${isUser ? 'justify-end' : 'justify-start'}`}
              >
                {!isUser && (
                  <div className="flex-shrink-0 w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                    <Bot className="w-4 h-4 text-primary" />
                  </div>
                )}
                
                <div className={`max-w-[80%] ${isUser ? 'order-first' : ''}`}>
                  {!isUser && message.agentId && (
                    <div className="flex items-center gap-2 mb-1">
                      <Badge variant="outline" className="text-xs">
                        {message.agentId}
                      </Badge>
                      {message.confidence && (
                        <ConfidenceBadge confidence={message.confidence} />
                      )}
                    </div>
                  )}
                  
                  <Card className={isUser ? 'bg-primary text-primary-foreground' : ''}>
                    <CardContent className="p-3">
                      <p className="text-sm whitespace-pre-wrap">{message.content}</p>
                      
                      {message.structuredResponse && (
                        <div className="mt-3 space-y-2">
                          {message.structuredResponse.supporting_evidence && (
                            <details className="text-xs">
                              <summary className="cursor-pointer font-medium">
                                Supporting Evidence
                              </summary>
                              <ul className="mt-1 space-y-1 pl-4">
                                {message.structuredResponse.supporting_evidence.map((evidence, i) => (
                                  <li key={i} className="list-disc">{evidence}</li>
                                ))}
                              </ul>
                            </details>
                          )}
                          
                          {message.structuredResponse.json_metrics && (
                            <details className="text-xs">
                              <summary className="cursor-pointer font-medium">
                                Metrics & Data
                              </summary>
                              <pre className="mt-1 p-2 bg-muted rounded text-xs overflow-auto">
                                {JSON.stringify(message.structuredResponse.json_metrics, null, 2)}
                              </pre>
                            </details>
                          )}
                        </div>
                      )}
                      
                      {message.reasoning && (
                        <ReasoningTrace reasoning={message.reasoning} />
                      )}
                    </CardContent>
                  </Card>
                  
                  <p className="text-xs text-muted-foreground mt-1">
                    {new Date(message.timestamp).toLocaleTimeString()}
                  </p>
                </div>
                
                {isUser && (
                  <div className="flex-shrink-0 w-8 h-8 rounded-full bg-secondary flex items-center justify-center">
                    <User className="w-4 h-4" />
                  </div>
                )}
              </div>
            );
          };
        
          return (
            <Card className="flex flex-col h-[600px]">
              <CardHeader className="flex-shrink-0 border-b">
                <CardTitle className="flex items-center gap-2">
                  <Bot className="w-5 h-5" />
                  OncoAgent AI Assistant
                  {currentAgent && (
                    <Badge variant="secondary">{currentAgent}</Badge>
                  )}
                </CardTitle>
              </CardHeader>
              
              <ScrollArea ref={scrollRef} className="flex-1 p-4">
                <div className="space-y-4">
                  {messages.map(renderMessage)}
                  
                  {isLoading && (
                    <div className="flex gap-3">
                      <div className="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                        <Loader2 className="w-4 h-4 animate-spin text-primary" />
                      </div>
                      <Card>
                        <CardContent className="p-3">
                          <p className="text-sm text-muted-foreground">
                            Analyzing with {currentAgent || 'AI'}...
                          </p>
                        </CardContent>
                      </Card>
                    </div>
                  )}
                </div>
              </ScrollArea>
              
              <div className="flex-shrink-0 border-t p-4">
                <form onSubmit={handleSubmit} className="flex gap-2">
                  <Input
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    placeholder="Ask about the patient, request analysis, or get evidence..."
                    disabled={isLoading}
                    className="flex-1"
                  />
                  <Button type="submit" disabled={isLoading || !input.trim()}>
                    {isLoading ? (
                      <Loader2 className="w-4 h-4 animate-spin" />
                    ) : (
                      <Send className="w-4 h-4" />
                    )}
                  </Button>
                </form>
                <p className="text-xs text-muted-foreground mt-2">
                  All recommendations require clinician review. AI confidence scores and reasoning traces provided.
                </p>
              </div>
            </Card>
          );
        }

    ai_insights_panel:
      file: "src/components/ai/AIInsightsPanel.tsx"
      description: "Real-time AI insights panel showing alerts and recommendations"
      code: |
        'use client';
        
        import { useEffect } from 'react';
        import { useRealTimeAlerts } from '@/hooks/useRealTimeAlerts';
        import { Card, CardContent, CardHeader, CardTitle } from '@/components/ui/card';
        import { Badge } from '@/components/ui/badge';
        import { Button } from '@/components/ui/button';
        import { ScrollArea } from '@/components/ui/scroll-area';
        import { 
          AlertTriangle, 
          TrendingUp, 
          Beaker, 
          FileText, 
          CheckCircle2,
          Clock,
          ArrowRight
        } from 'lucide-react';
        import { ConfidenceBadge } from './ConfidenceBadge';
        import type { AIInsight, AlertUrgency } from '@/lib/types/ai';
        
        interface AIInsightsPanelProps {
          patientId: string;
        }
        
        const urgencyConfig: Record<AlertUrgency, { color: string; icon: React.ReactNode }> = {
          CRITICAL: { color: 'destructive', icon: <AlertTriangle className="w-4 h-4" /> },
          HIGH: { color: 'warning', icon: <Clock className="w-4 h-4" /> },
          ROUTINE: { color: 'secondary', icon: <CheckCircle2 className="w-4 h-4" /> },
        };
        
        const insightTypeConfig: Record<string, { icon: React.ReactNode; label: string }> = {
          risk_score: { icon: <TrendingUp className="w-4 h-4" />, label: 'Risk Assessment' },
          trial_match: { icon: <Beaker className="w-4 h-4" />, label: 'Trial Match' },
          imaging_finding: { icon: <FileText className="w-4 h-4" />, label: 'Imaging' },
          treatment_recommendation: { icon: <CheckCircle2 className="w-4 h-4" />, label: 'Treatment' },
        };
        
        export function AIInsightsPanel({ patientId }: AIInsightsPanelProps) {
          const { insights, isConnected, acknowledgeInsight } = useRealTimeAlerts(patientId);
        
          return (
            <Card className="h-full">
              <CardHeader className="flex-row items-center justify-between space-y-0 pb-2">
                <CardTitle className="text-lg font-medium">AI Insights</CardTitle>
                <div className="flex items-center gap-2">
                  <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-green-500' : 'bg-red-500'}`} />
                  <span className="text-xs text-muted-foreground">
                    {isConnected ? 'Live' : 'Disconnected'}
                  </span>
                </div>
              </CardHeader>
              
              <CardContent>
                <ScrollArea className="h-[400px] pr-4">
                  <div className="space-y-3">
                    {insights.length === 0 ? (
                      <p className="text-sm text-muted-foreground text-center py-8">
                        No active insights for this patient
                      </p>
                    ) : (
                      insights.map((insight) => (
                        <InsightCard
                          key={insight.id}
                          insight={insight}
                          onAcknowledge={() => acknowledgeInsight(insight.id)}
                        />
                      ))
                    )}
                  </div>
                </ScrollArea>
              </CardContent>
            </Card>
          );
        }
        
        function InsightCard({ 
          insight, 
          onAcknowledge 
        }: { 
          insight: AIInsight; 
          onAcknowledge: () => void;
        }) {
          const urgency = urgencyConfig[insight.urgency];
          const typeConfig = insightTypeConfig[insight.type] || { 
            icon: <FileText className="w-4 h-4" />, 
            label: 'Insight' 
          };
        
          return (
            <Card className={`border-l-4 ${
              insight.urgency === 'CRITICAL' ? 'border-l-red-500 bg-red-50 dark:bg-red-950/20' :
              insight.urgency === 'HIGH' ? 'border-l-yellow-500 bg-yellow-50 dark:bg-yellow-950/20' :
              'border-l-blue-500'
            }`}>
              <CardContent className="p-3">
                <div className="flex items-start justify-between gap-2">
                  <div className="flex items-center gap-2">
                    {typeConfig.icon}
                    <span className="text-xs font-medium">{typeConfig.label}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <Badge variant={urgency.color as any} className="text-xs">
                      {insight.urgency}
                    </Badge>
                    <ConfidenceBadge confidence={insight.confidence} size="sm" />
                  </div>
                </div>
                
                <p className="text-sm mt-2">{insight.summary}</p>
                
                {insight.agentId && (
                  <p className="text-xs text-muted-foreground mt-1">
